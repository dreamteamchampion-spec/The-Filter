<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Filter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --surface3:#222; --border:#2a2a2a;
  --gold:#c9a84c; --gold-dim:#8a6f2e; --red:#c0392b; --red-dim:#7a2020;
  --green:#2ecc71; --green-dim:#1a6b3a; --text:#e8e8e8; --text-dim:#888; --text-faint:#444;
  --mono:'Space Mono',monospace; --sans:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}
#app{display:flex;flex-direction:column;height:100%;width:100%;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;}
.logo{font-family:var(--mono);font-size:13px;color:var(--gold);letter-spacing:0.12em;white-space:nowrap;}
.pstrip{display:flex;gap:6px;overflow-x:auto;flex:1;padding:2px 0;-webkit-overflow-scrolling:touch;}
.pstrip::-webkit-scrollbar{display:none;}
.strip-item{flex-shrink:0;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;min-width:90px;text-align:center;}
.strip-item.active{border-color:var(--gold-dim);background:var(--surface3);}
.strip-name{font-family:var(--mono);font-size:11px;color:var(--text);display:block;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.strip-tag{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
.btn-new{flex-shrink:0;background:var(--gold);color:#000;border:none;padding:7px 12px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.prospect-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.prospect-name{font-family:var(--mono);font-size:17px;font-style:italic;color:var(--text);}
.prospect-meta{font-size:11px;color:var(--text-dim);margin-top:2px;}
.btn-remove{background:none;border:1px solid var(--red-dim);color:var(--red);padding:5px 10px;font-family:var(--mono);font-size:9px;cursor:pointer;flex-shrink:0;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:10px 6px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:var(--mono);font-size:9px;letter-spacing:0.1em;cursor:pointer;text-transform:uppercase;text-align:center;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;min-height:0;}
.input-bar{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.mode-row{display:flex;gap:6px;}
.mode-btn{flex:1;padding:7px;background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;cursor:pointer;text-transform:uppercase;}
.mode-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.msg-textarea{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:10px;resize:none;height:52px;outline:none;line-height:1.5;-webkit-appearance:none;}
.msg-textarea:focus{border-color:var(--gold-dim);}
.mic-btn{flex-shrink:0;width:44px;height:52px;background:var(--gold);border:none;color:#000;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mic-btn.listening{background:var(--red);color:#fff;animation:pulse 1s infinite;}
.btn-submit{width:100%;padding:11px;background:var(--gold);color:#000;border:none;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;text-transform:uppercase;}
.btn-submit:disabled{background:var(--surface3);color:var(--text-faint);cursor:not-allowed;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-family:var(--mono);font-size:11px;gap:10px;text-align:center;padding:40px 20px;}
.empty-icon{font-size:40px;opacity:0.2;}
.card{background:var(--surface2);border:1px solid var(--border);padding:13px;margin-bottom:10px;}
.card-label{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;}
.card-text{font-size:12px;color:var(--text-dim);line-height:1.7;}
.card-strategy{font-size:12px;color:var(--gold);font-style:italic;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.reply-card{background:var(--surface2);border:1px solid var(--border);padding:13px;margin-bottom:8px;cursor:pointer;}
.reply-card:active{border-color:var(--gold);}
.reply-num{font-family:var(--mono);font-size:9px;color:var(--text-faint);letter-spacing:0.1em;margin-bottom:6px;display:flex;justify-content:space-between;}
.reply-num span{color:var(--gold);}
.reply-text{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;}
.reply-why{font-size:11px;color:var(--text-dim);font-style:italic;line-height:1.5;padding-top:8px;border-top:1px solid var(--border);}
.flag-box{background:rgba(192,57,43,0.1);border:1px solid var(--red-dim);padding:12px 13px;margin-bottom:10px;}
.flag-title{font-family:var(--mono);font-size:9px;color:var(--red);letter-spacing:0.12em;margin-bottom:6px;}
.flag-text{font-size:12px;color:var(--red);line-height:1.6;}
.stage-rec{background:rgba(201,168,76,0.08);border-left:2px solid var(--gold);padding:10px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.stage-rec-text{font-size:12px;color:var(--gold);line-height:1.5;}
.btn-confirm{flex-shrink:0;background:var(--gold);color:#000;border:none;padding:5px 10px;font-family:var(--mono);font-size:9px;font-weight:700;cursor:pointer;}
.checkin-box{background:rgba(201,168,76,0.06);border:1px solid var(--gold-dim);padding:13px;margin-bottom:10px;}
.checkin-q{font-size:13px;color:var(--gold);margin-bottom:10px;line-height:1.5;}
.verdict-box{background:var(--surface2);border-left:3px solid var(--gold);padding:13px;margin-bottom:10px;}
.verdict-box-label{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:0.15em;margin-bottom:6px;}
.verdict-box-text{font-size:12px;color:var(--text-dim);line-height:1.7;}
.history-item{background:var(--surface2);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;font-size:11px;color:var(--text-dim);line-height:1.5;}
.history-who{font-family:var(--mono);font-size:9px;color:var(--text-faint);margin-bottom:3px;}
.section{margin-bottom:22px;}
.section-label{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px;}
.verdict-btns{display:flex;gap:6px;}
.verdict-btn{flex:1;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:9px;letter-spacing:0.08em;cursor:pointer;text-align:center;}
.verdict-btn.vb-proceed{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.verdict-btn.vb-pending{background:var(--surface3);border-color:var(--gold);color:var(--gold);}
.verdict-btn.vb-walkaway{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.stage-list{display:flex;flex-direction:column;gap:4px;}
.stage-item{padding:9px 12px;background:var(--surface2);border:1px solid transparent;font-family:var(--mono);font-size:11px;color:var(--text-faint);cursor:pointer;display:flex;gap:10px;align-items:center;}
.stage-item.s-active{background:var(--surface3);border-color:var(--gold-dim);color:var(--gold);}
.stage-item.s-done{color:var(--text-dim);}
.stage-code{font-size:10px;color:var(--text-faint);}
.stage-item.s-active .stage-code{color:var(--gold-dim);}
.score-display{text-align:center;padding:14px;background:var(--surface2);border:1px solid var(--border);margin-bottom:14px;}
.score-number{font-family:var(--mono);font-size:38px;color:var(--gold);line-height:1;}
.score-bar{height:2px;background:var(--surface3);margin:8px auto;max-width:100px;}
.score-bar-fill{height:100%;background:var(--red);transition:width 0.4s;}
.score-sublabel{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:0.1em;}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.score-row-info{flex:1;}
.score-row-label{font-size:12px;color:var(--text-dim);}
.score-row-weight{font-size:10px;color:var(--text-faint);}
.score-slider{width:70px;-webkit-appearance:none;height:2px;background:var(--surface3);outline:none;flex-shrink:0;}
.score-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--gold);cursor:pointer;border-radius:0;}
.score-val{font-family:var(--mono);font-size:12px;width:20px;text-align:right;color:var(--text);flex-shrink:0;}
.dq-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.dq-item.dq-on{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.dq-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--text-faint);flex-shrink:0;}
.dq-item.dq-on .dq-dot{background:var(--red);border-color:var(--red);}
.bs-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.bs-item.bs-on{background:rgba(201,168,76,0.08);border-color:var(--gold-dim);color:var(--gold);}
.bs-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--text-faint);flex-shrink:0;}
.bs-item.bs-on .bs-dot{background:var(--gold);border-color:var(--gold);}
.notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:11px;resize:vertical;min-height:90px;outline:none;line-height:1.6;}
.notes-area:focus{border-color:var(--gold-dim);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);padding:22px;width:100%;max-width:380px;}
.modal-title{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:18px;}
.field{margin-bottom:12px;}
.field-label{display:block;font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:5px;text-transform:uppercase;}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:9px 11px;outline:none;-webkit-appearance:none;}
.field-input:focus{border-color:var(--gold-dim);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.btn-primary{flex:1;padding:10px;background:var(--gold);color:#000;border:none;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;}
.btn-secondary{flex:1;padding:10px;background:none;color:var(--text-dim);border:1px solid var(--border);font-family:var(--mono);font-size:11px;cursor:pointer;}
.btn-dismiss{margin-top:8px;padding:5px 10px;background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:10px;cursor:pointer;}
.loading{display:flex;align-items:center;gap:8px;padding:16px 0;color:var(--text-dim);font-family:var(--mono);font-size:11px;}
.dots span{animation:blink 1.2s infinite;font-size:20px;color:var(--gold);}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STAGES=[
  {code:'A1',label:'Initial Contact'},
  {code:'A2',label:'Demonstrating Value'},
  {code:'A3',label:'Qualifying Her'},
  {code:'C1',label:'Early Rapport'},
  {code:'C2',label:'Deeper Connection'},
  {code:'C3',label:'Full Clarity'},
];
const SCORE_FIELDS=[
  {key:'emotionalStability',label:'Emotional Stability',w:20},
  {key:'loyaltyHonesty',label:'Loyalty & Honesty',w:20},
  {key:'maternalWarmth',label:'Maternal Warmth',w:15},
  {key:'valuesAlignment',label:'Values Alignment',w:15},
  {key:'financialCharacter',label:'Financial Character',w:10},
  {key:'communication',label:'Communication',w:10},
  {key:'naturalPresentation',label:'Natural Presentation',w:5},
  {key:'peacefulPresence',label:'Peaceful Presence',w:5},
];
const DISQUALIFIERS=[
  'Has children already','Smokes','Excessive profanity',
  'No accountability / always the victim','Emotional volatility',
  'Financial irresponsibility','Early dishonesty / story changes',
  'Flirting with others in your presence','Swore at you directly',
  'Projecting unresolved trauma','Hidden agenda / managing you',
  'Hot/cold inconsistency',
];
const BLIND_SPOTS=[
  'Fixer pattern active',
  'Making exception to own rules',
  'Measuring against Tia',
  'Cold exit impulse',
];
function emptyScores(){const s={};SCORE_FIELDS.forEach(f=>s[f.key]=0);return s;}
function calcScore(p){
  if(!p.scores)return 0;
  let t=0;SCORE_FIELDS.forEach(f=>{t+=(p.scores[f.key]||0)*(f.w/100);});
  return Math.round(t*10);
}
function load(){try{return JSON.parse(localStorage.getItem('filter_v4')||'null');}catch{return null;}}
function save(){localStorage.setItem('filter_v4',JSON.stringify(state));}
let state=load()||{prospects:[],activeId:null};
function getP(){return state.prospects.find(p=>p.id===state.activeId)||null;}

// VOICE
let recog=null,recogTarget=null;
function setupMic(inputId,btnId){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const btn=document.getElementById(btnId);
  const inp=document.getElementById(inputId);
  if(!btn||!inp)return;
  if(!SR){btn.style.opacity='0.4';return;}
  btn.onclick=async function(){
    if(recog&&recogTarget===inputId){recog.stop();return;}
    if(recog)recog.stop();
    try{await navigator.mediaDevices.getUserMedia({audio:true});}
    catch(e){btn.textContent='No mic';setTimeout(function(){btn.textContent='mic';},2000);return;}
    recog=new SR();recog.continuous=true;recog.interimResults=true;recog.lang='en-GB';
    recogTarget=inputId;
    btn.classList.add('listening');
    let base=inp.value;
    recog.onresult=function(e){
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)fin+=e.results[i][0].transcript;
        else int+=e.results[i][0].transcript;
      }
      if(fin)base+=fin+' ';
      inp.value=base+int;
    };
    recog.onerror=function(){btn.classList.remove('listening');recog=null;recogTarget=null;};
    recog.onend=function(){btn.classList.remove('listening');recog=null;recogTarget=null;};
    recog.start();
  };
}

// API
async function ai(system,messages){
  const r=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system,messages})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'API error');
  return d.content[0].text;
}

// RENDER
function render(){
  const root=document.getElementById('app');
  const p=getP();
  let html='<div class="topbar"><div class="logo">THE FILTER</div><div class="pstrip" id="pstrip">';
  state.prospects.forEach(function(pr){
    html+='<div class="strip-item '+(pr.id===state.activeId?'active':'')+'" data-pid="'+pr.id+'"><span class="strip-name">'+pr.name+'</span><span class="strip-tag">'+(pr.stage||'A1')+' &middot; '+(calcScore(pr)||'--')+'</span></div>';
  });
  html+='</div><button class="btn-new" id="btn-new">+ NEW</button></div>';
  if(!p){
    html+='<div class="main-body"><div class="empty"><div class="empty-icon">&#9675;</div><div style="font-size:14px;color:var(--text-dim);">The Filter</div><div>Add a prospect to begin</div><div style="color:var(--gold);font-size:10px;margin-top:4px;">YOUR STANDARD DOES NOT LOWER</div></div></div>';
  } else {
    const tab=p._tab||'copilot';
    html+='<div class="prospect-header"><div><div class="prospect-name">'+p.name+'</div><div class="prospect-meta">'+p.platform+' &middot; Age '+p.age+'</div></div><button class="btn-remove" id="btn-remove">Remove</button></div>';
    html+='<div class="tabs"><button class="tab '+(tab==='copilot'?'active':'')+'" data-tab="copilot">Co-Pilot</button><button class="tab '+(tab==='profile'?'active':'')+'" data-tab="profile">Profile & Score</button><button class="tab '+(tab==='debrief'?'active':'')+'" data-tab="debrief">Debrief</button></div>';
    html+='<div class="main-body" id="main-body">';
    if(tab==='copilot')html+=renderCopilot(p);
    else if(tab==='profile')html+='<div class="scroll-area">'+renderProfile(p)+'</div>';
    else html+=renderDebrief(p);
    html+='</div>';
  }
  root.innerHTML=html;
  bindEvents();
}

function renderCopilot(p){
  const history=p.history||[];
  const flag=p.pendingFlag||null;
  const stageRec=p.stageRec||null;
  const stallingExit=p.stallingExit||null;
  const verdictRec=p.verdictRec||null;
  let html='<div class="scroll-area" id="copilot-scroll">';
  if(verdictRec){html+='<div class="verdict-box"><div class="verdict-box-label">Verdict Recommendation</div><div class="verdict-box-text">'+verdictRec+'</div><button class="btn-dismiss" id="dismiss-verdict">Dismiss</button></div>';}
  if(stallingExit){html+='<div class="flag-box"><div class="flag-title">EXIT STRATEGY</div><div class="flag-text">'+stallingExit+'</div><button class="btn-dismiss" id="dismiss-stalling">Dismiss</button></div>';}
  if(flag){html+='<div class="flag-box"><div class="flag-title">PATTERN DETECTED</div><div class="flag-text">'+flag+'</div><button class="btn-dismiss" id="dismiss-flag">Got it</button></div>';}
  if(stageRec){html+='<div class="stage-rec"><div class="stage-rec-text">'+stageRec.message+'</div><button class="btn-confirm" id="btn-confirm-stage" data-stage="'+stageRec.stage+'">Confirm</button></div>';}
  html+='<div id="analysis-out"></div>';
  if(history.length>0){
    html+='<div style="margin-top:12px;"><div class="section-label">Recent exchanges</div>';
    var recent=history.slice(-3).reverse();
    recent.forEach(function(h){
      html+='<div class="history-item"><div class="history-who">'+(h.dir==='in'?'HER':'YOU')+' &middot; '+h.ts+'</div>'+h.text.substring(0,100)+(h.text.length>100?'&hellip;':'')+'</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  html+='<div class="input-bar">';
  html+='<div class="mode-row"><button class="mode-btn active" id="mode-context" data-mode="context">My Context</button><button class="mode-btn" id="mode-her" data-mode="her_message">Her Message</button></div>';
  html+='<div class="input-row"><textarea class="msg-textarea" id="msg-input" placeholder="Tell me what is going on..."></textarea><button class="mic-btn" id="mic-msg">&#127908;</button></div>';
  html+='<button class="btn-submit" id="btn-analyse">Analyse</button>';
  html+='</div>';
  return html;
}

function renderProfile(p){
  const score=calcScore(p);
  const col=score>=70?'#2ecc71':score>=40?'#c9a84c':'#c0392b';
  let html='';
  html+='<div class="section"><div class="section-label">Verdict</div><div class="verdict-btns">';
  html+='<button class="verdict-btn '+(p.verdict==='proceed'?'vb-proceed':'')+'" data-v="proceed">Proceed</button>';
  html+='<button class="verdict-btn '+((!p.verdict||p.verdict==='pending')?'vb-pending':'')+'" data-v="pending">Pending</button>';
  html+='<button class="verdict-btn '+(p.verdict==='walkaway'?'vb-walkaway':'')+'" data-v="walkaway">Walk Away</button>';
  html+='</div></div>';
  html+='<div class="section"><div class="section-label">Conversation Stage</div><div class="stage-list">';
  STAGES.forEach(function(s){
    const ai=STAGES.findIndex(function(x){return x.code===(p.stage||'A1');});
    const si=STAGES.findIndex(function(x){return x.code===s.code;});
    html+='<div class="stage-item '+(s.code===(p.stage||'A1')?'s-active':si<ai?'s-done':'')+'" data-stage="'+s.code+'"><span class="stage-code">'+s.code+'</span><span>'+s.label+'</span></div>';
  });
  html+='</div></div>';
  html+='<div class="section"><div class="section-label">Blueprint Score</div>';
  html+='<div class="score-display"><div class="score-number">'+score+'</div><div class="score-bar"><div class="score-bar-fill" style="width:'+score+'%;background:'+col+'"></div></div><div class="score-sublabel">Compatibility / 100</div></div>';
  SCORE_FIELDS.forEach(function(f){
    html+='<div class="score-row"><div class="score-row-info"><div class="score-row-label">'+f.label+'</div><div class="score-row-weight">x'+f.w+'%</div></div>';
    html+='<input type="range" class="score-slider" min="0" max="10" value="'+(p.scores&&p.scores[f.key]||0)+'" data-sk="'+f.key+'">';
    html+='<div class="score-val" id="sv-'+f.key+'">'+(p.scores&&p.scores[f.key]||0)+'</div></div>';
  });
  html+='</div>';
  html+='<div class="section"><div class="section-label">Hard Disqualifiers</div>';
  DISQUALIFIERS.forEach(function(dq){
    const on=(p.flaggedDQs||[]).includes(dq);
    html+='<div class="dq-item '+(on?'dq-on':'')+'" data-dq="'+dq+'"><div class="dq-dot"></div>'+dq+'</div>';
  });
  html+='</div>';
  html+='<div class="section"><div class="section-label">Blind Spot Check</div>';
  BLIND_SPOTS.forEach(function(bs){
    const on=(p.activeBS||[]).includes(bs);
    html+='<div class="bs-item '+(on?'bs-on':'')+'" data-bs="'+bs+'"><div class="bs-dot"></div>'+bs+'</div>';
  });
  html+='</div>';
  html+='<div class="section"><div class="section-label">Notes</div><textarea class="notes-area" id="notes-area">'+(p.notes||'')+'</textarea></div>';
  return html;
}

function renderDebrief(p){
  const debriefs=p.debriefs||[];
  let html='<div class="scroll-area" id="debrief-scroll">';
  html+='<div class="card" style="margin-bottom:12px;"><div class="card-label">How did it go?</div><div class="card-text">Tell me about the date, call, whatever happened. Just talk naturally.</div></div>';
  html+='<div id="debrief-out"></div>';
  if(debriefs.length>0){
    html+='<div class="section-label" style="margin-top:4px;">Previous debriefs</div>';
    debriefs.slice(-3).reverse().forEach(function(d){
      html+='<div class="card"><div class="card-label">'+d.ts+'</div><div class="card-text">'+d.summary+'</div></div>';
    });
  }
  html+='</div>';
  html+='<div class="input-bar">';
  html+='<div class="input-row"><textarea class="msg-textarea" id="debrief-input" placeholder="She was warmer than expected..." style="height:72px;"></textarea><button class="mic-btn" id="mic-debrief">&#127908;</button></div>';
  html+='<button class="btn-submit" id="btn-debrief">Process Debrief</button>';
  html+='</div>';
  return html;
}

// EVENTS
function bindEvents(){
  var btnNew=document.getElementById('btn-new');
  if(btnNew)btnNew.addEventListener('click',showModal);
  document.querySelectorAll('.strip-item[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){state.activeId=el.dataset.pid;save();render();});
  });
  var btnRemove=document.getElementById('btn-remove');
  if(btnRemove)btnRemove.addEventListener('click',function(){
    if(!confirm('Remove this prospect?'))return;
    state.prospects=state.prospects.filter(function(p){return p.id!==state.activeId;});
    state.activeId=state.prospects[0]?state.prospects[0].id:null;
    save();render();
  });
  document.querySelectorAll('.tab[data-tab]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=getP();if(!p)return;
      p._tab=el.dataset.tab;save();render();
    });
  });
  document.querySelectorAll('[data-v]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=getP();if(!p)return;
      p.verdict=el.dataset.v;save();render();
    });
  });
  document.querySelectorAll('.stage-item[data-stage]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=getP();if(!p)return;
      p.stage=el.dataset.stage;save();render();
    });
  });
  var btnConfirmStage=document.getElementById('btn-confirm-stage');
  if(btnConfirmStage)btnConfirmStage.addEventListener('click',function(e){
    var p=getP();if(!p)return;
    p.stage=e.target.dataset.stage;p.stageRec=null;save();render();
  });
  document.querySelectorAll('.score-slider[data-sk]').forEach(function(el){
    el.addEventListener('input',function(){
      var p=getP();if(!p)return;
      if(!p.scores)p.scores=emptyScores();
      p.scores[el.dataset.sk]=parseInt(el.value);
      var v=document.getElementById('sv-'+el.dataset.sk);
      if(v)v.textContent=el.value;
      var sn=document.querySelector('.score-number');
      if(sn)sn.textContent=calcScore(p);
      save();
    });
  });
  document.querySelectorAll('.dq-item[data-dq]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=getP();if(!p)return;
      if(!p.flaggedDQs)p.flaggedDQs=[];
      var dq=el.dataset.dq;
      p.flaggedDQs=p.flaggedDQs.includes(dq)?p.flaggedDQs.filter(function(x){return x!==dq;}):[...p.flaggedDQs,dq];
      save();render();
    });
  });
  document.querySelectorAll('.bs-item[data-bs]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=getP();if(!p)return;
      if(!p.activeBS)p.activeBS=[];
      var bs=el.dataset.bs;
      p.activeBS=p.activeBS.includes(bs)?p.activeBS.filter(function(x){return x!==bs;}):[...p.activeBS,bs];
      save();render();
    });
  });
  var notesArea=document.getElementById('notes-area');
  if(notesArea)notesArea.addEventListener('blur',function(e){
    var p=getP();if(!p)return;
    p.notes=e.target.value;save();
  });
  var dismissFlag=document.getElementById('dismiss-flag');
  if(dismissFlag)dismissFlag.addEventListener('click',function(){var p=getP();if(!p)return;p.pendingFlag=null;save();render();});
  var dismissStalling=document.getElementById('dismiss-stalling');
  if(dismissStalling)dismissStalling.addEventListener('click',function(){var p=getP();if(!p)return;p.stallingExit=null;p.stalling=false;save();render();});
  var dismissVerdict=document.getElementById('dismiss-verdict');
  if(dismissVerdict)dismissVerdict.addEventListener('click',function(){var p=getP();if(!p)return;p.verdictRec=null;save();render();});
  // Mode buttons
  document.querySelectorAll('.mode-btn[data-mode]').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      var inp=document.getElementById('msg-input');
      if(inp){
        if(btn.dataset.mode==='her_message'){
          inp.placeholder='Paste her message here...';
        } else {
          inp.placeholder='Tell me what is going on...';
        }
      }
    });
  });
  var btnAnalyse=document.getElementById('btn-analyse');
  if(btnAnalyse)btnAnalyse.addEventListener('click',doAnalyse);
  var btnDebrief=document.getElementById('btn-debrief');
  if(btnDebrief)btnDebrief.addEventListener('click',doDebrief);
  setupMic('msg-input','mic-msg');
  setupMic('debrief-input','mic-debrief');
}

// ANALYSE
function doAnalyse(){
  var p=getP();if(!p)return;
  var inp=document.getElementById('msg-input');
  var msg=inp?inp.value.trim():'';if(!msg)return;
  var out=document.getElementById('analysis-out');
  out.innerHTML='<div class="loading"><div class="dots"><span>.</span><span>.</span><span>.</span></div>&nbsp;Reading...</div>';
  var activeBtn=document.querySelector('.mode-btn.active');
  var selectedMode=activeBtn?activeBtn.dataset.mode:'context';
  var stageInfo=STAGES.find(function(s){return s.code===(p.stage||'A1');});
  var hist=(p.history||[]).slice(-10).map(function(h){return '['+(h.dir==='in'?'HER':'YOU')+']: '+h.text;}).join('\n');
  var copilotMemory=p.copilotMemory||[];
  var modeInstruction=selectedMode==='her_message'
    ? 'Kwasi is pasting a message she sent him. Give a brief read then suggest 3 replies. Set mode to her_message.'
    : 'Kwasi is giving you context about the situation. Do NOT suggest replies. Give your honest read. Ask 1-2 follow-up questions. Update scores silently. Only flag patterns seen more than once. Set mode to context.';
  var sys='You are The Filter — a grounded co-pilot for Kwasi. He is dating with serious intent: marriage and family within 5 years. INTJ. Acts of service. Emotionally guarded but loyal. Targets ESFJ-type partners.\n\nBlind spots: fixer tendency, makes exceptions to his rules, measures women against ex Tia, cold exit impulse.\n\nProspect: '+p.name+', '+p.platform+', Age '+p.age+'\nStage: '+(stageInfo?stageInfo.code:'')+' - '+(stageInfo?stageInfo.label:'')+'\nScore: '+calcScore(p)+'/100\nExchanges: '+(p.history||[]).length+'\nFlagged DQs: '+((p.flaggedDQs||[]).join(', ')||'None')+'\nKnown patterns: '+(p.knownPatterns||'None yet')+'\nRecent history:\n'+(hist||'None yet.')+'\n\n'+modeInstruction+'\n\nReply voice: dry, plain, short sentences. Never smooth or performative. A1/A2: measured, detached. C1/C2: warmer but grounded. C3: open and direct. Good: "You went quiet - everything good?" Bad: "I noticed some inconsistency in your communication."\n\nOnly include strategicMove when something genuinely needs addressing (been texting too long without date, pattern forming, momentum stalling).\n\nRespond ONLY in valid JSON:\n{"mode":"context or her_message","read":"honest 2-3 sentence read","followUpQuestions":null,"strategicMove":null,"stageRecommend":null,"flagPattern":null,"blindSpotAlert":null,"stallingAlert":null,"verdictReady":null,"scoreUpdates":null,"newPatterns":null,"replies":null}';
  var messages=copilotMemory.concat([{role:'user',content:msg}]);
  ai(sys,messages).then(function(raw){
    var result;
    try{result=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){out.innerHTML='<div class="card"><div class="card-text" style="color:var(--red)">Parse error: '+e.message+'</div></div>';return;}
    if(!p.history)p.history=[];
    p.history.push({dir:'in',text:msg,ts:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
    // Track score changes
    var scoreChanges=[];
    if(result.scoreUpdates&&p.scores){
      Object.keys(result.scoreUpdates).forEach(function(k){
        if(p.scores.hasOwnProperty(k)){
          var oldVal=p.scores[k];
          var newVal=result.scoreUpdates[k];
          if(newVal!==oldVal)scoreChanges.push({key:k,old:oldVal,newVal:newVal});
          p.scores[k]=newVal;
        }
      });
    }
    if(result.newPatterns){p.knownPatterns=p.knownPatterns?p.knownPatterns+', '+result.newPatterns:result.newPatterns;}
    if(result.stageRecommend)p.stageRec=result.stageRecommend;
    if(result.flagPattern)p.pendingFlag=result.flagPattern;
    if(result.stallingAlert){p.stallingExit=result.stallingAlert;p.stalling=true;}
    if(result.verdictReady)p.verdictRec=result.verdictReady;
    if(!p.copilotMemory)p.copilotMemory=[];
    p.copilotMemory.push({role:'user',content:msg});
    p.copilotMemory.push({role:'assistant',content:raw});
    if(p.copilotMemory.length>40)p.copilotMemory=p.copilotMemory.slice(-40);
    save();
    // Score change HTML
    var scoreHtml='';
    if(scoreChanges.length>0){
      scoreHtml='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;font-family:var(--mono);color:var(--text-faint);">';
      scoreChanges.forEach(function(c){
        var diff=c.newVal-c.old;
        var col=diff>0?'var(--green)':'var(--red)';
        var field=SCORE_FIELDS.find(function(f){return f.key===c.key;});
        var label=field?field.label:c.key;
        scoreHtml+='<span style="margin-right:10px;color:'+col+'">'+label+' '+(diff>0?'up':'dn')+Math.abs(diff)+'</span>';
      });
      scoreHtml+='</div>';
    }
    var html='<div class="card"><div class="card-label">'+(result.mode==='unclear'?'Clarification':result.mode==='context'?'My Read':'Situational Read')+'</div><div class="card-text">'+result.read+'</div>'+(result.blindSpotAlert?'<div style="margin-top:8px;font-size:12px;color:var(--red)">Warning: '+result.blindSpotAlert+'</div>':'')+scoreHtml+'</div>';
    if(result.strategicMove){html+='<div style="background:rgba(201,168,76,0.06);border-left:2px solid var(--gold);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--gold);line-height:1.5;">Next move: '+result.strategicMove+'</div>';}
    if(result.followUpQuestions&&result.followUpQuestions.length>0){
      html+='<div class="checkin-box"><div class="checkin-q" style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">To build a better picture:</div>';
      result.followUpQuestions.forEach(function(q,i){html+='<div style="font-size:13px;color:var(--gold);margin-bottom:8px;line-height:1.5;">'+(i+1)+'. '+q+'</div>';});
      html+='</div>';
    }
    if(result.replies&&result.replies.length>0){
      result.replies.forEach(function(r,i){
        html+='<div class="reply-card" data-reply="'+encodeURIComponent(r.text)+'"><div class="reply-num">OPTION '+(i+1)+' <span>tap to use</span></div><div class="reply-text">'+r.text+'</div><div class="reply-why">'+r.why+'</div></div>';
      });
    }
    out.innerHTML=html;
    inp.value='';
    document.querySelectorAll('.reply-card[data-reply]').forEach(function(el){
      el.addEventListener('click',function(){
        var text=decodeURIComponent(el.dataset.reply);
        if(!p.history)p.history=[];
        p.history.push({dir:'out',text:text,ts:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
        save();
        el.style.borderColor='var(--gold)';
        setTimeout(function(){render();},600);
      });
    });
    out.scrollIntoView({behavior:'smooth',block:'start'});
  }).catch(function(err){
    out.innerHTML='<div class="card"><div class="card-text" style="color:var(--red)">Error: '+err.message+'</div></div>';
  });
}

// DEBRIEF
function doDebrief(){
  var p=getP();if(!p)return;
  var inp=document.getElementById('debrief-input');
  var text=inp?inp.value.trim():'';if(!text)return;
  var out=document.getElementById('debrief-out');
  out.innerHTML='<div class="loading"><div class="dots"><span>.</span><span>.</span><span>.</span></div>&nbsp;Processing...</div>';
  var sys='You are The Filter. Kwasi is debriefing after meeting '+p.name+'. Stage: '+(p.stage||'A1')+', Score: '+calcScore(p)+'/100. Extract insights. Respond ONLY in JSON: {"summary":"2-3 sentence honest summary","updates":[{"label":"what changed and why"}],"scoreUpdates":null,"stageAdvance":null,"flagPattern":null,"blindSpotAlert":null}';
  ai(sys,[{role:'user',content:text}]).then(function(raw){
    var result;
    try{result=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){out.innerHTML='<div class="card"><div class="card-text" style="color:var(--red)">Parse error</div></div>';return;}
    if(result.scoreUpdates&&p.scores){Object.keys(result.scoreUpdates).forEach(function(k){if(p.scores.hasOwnProperty(k))p.scores[k]=result.scoreUpdates[k];});}
    if(result.stageAdvance)p.stageRec=result.stageAdvance;
    if(result.flagPattern)p.pendingFlag=result.flagPattern;
    if(!p.debriefs)p.debriefs=[];
    p.debriefs.push({ts:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),raw:text,summary:result.summary});
    if(!p.copilotMemory)p.copilotMemory=[];
    p.copilotMemory.push({role:'user',content:'DEBRIEF: '+text});
    p.copilotMemory.push({role:'assistant',content:'Summary: '+result.summary});
    if(p.copilotMemory.length>40)p.copilotMemory=p.copilotMemory.slice(-40);
    save();
    var html='<div class="card"><div class="card-label">Debrief Summary</div><div class="card-text">'+result.summary+'</div>'+(result.blindSpotAlert?'<div style="margin-top:8px;font-size:12px;color:var(--red)">Warning: '+result.blindSpotAlert+'</div>':'')+'</div>';
    if(result.updates&&result.updates.length>0){
      result.updates.forEach(function(u){
        html+='<div style="display:flex;gap:8px;align-items:flex-start;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;font-size:12px;color:var(--text-dim);line-height:1.5;"><span style="color:var(--gold);font-family:var(--mono);">-&gt;</span>'+u.label+'</div>';
      });
    }
    out.innerHTML=html;
    inp.value='';
  }).catch(function(err){
    out.innerHTML='<div class="card"><div class="card-text" style="color:var(--red)">Error: '+err.message+'</div></div>';
  });
}

// MODAL
function showModal(){
  var ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML='<div class="modal"><div class="modal-title">New Prospect</div><div class="field"><label class="field-label">Name</label><input class="field-input" id="f-name" placeholder="First name"></div><div class="field"><label class="field-label">Platform</label><input class="field-input" id="f-platform" placeholder="Hinge, Happn, Other..."></div><div class="field"><label class="field-label">Age</label><input class="field-input" id="f-age" type="number" placeholder="Age"></div><div class="field"><label class="field-label">First impression</label><input class="field-input" id="f-notes" placeholder="She seems..."></div><div class="modal-btns"><button class="btn-secondary" id="m-cancel">Cancel</button><button class="btn-primary" id="m-confirm">Add</button></div></div>';
  document.body.appendChild(ov);
  document.getElementById('m-cancel').onclick=function(){ov.remove();};
  document.getElementById('m-confirm').onclick=function(){
    var name=document.getElementById('f-name').value.trim();
    if(!name)return;
    var np={
      id:Date.now().toString(),
      name:name,
      platform:document.getElementById('f-platform').value.trim()||'Unknown',
      age:document.getElementById('f-age').value.trim()||'?',
      notes:document.getElementById('f-notes').value.trim(),
      verdict:'pending',stage:'A1',
      scores:emptyScores(),flaggedDQs:[],activeBS:[],
      history:[],debriefs:[],copilotMemory:[],_tab:'copilot',
    };
    state.prospects.push(np);
    state.activeId=np.id;
    save();ov.remove();render();
  };
}

render();
</script>
</body>
