// V4 hardcore blueprint — runs continuously from C1 onward, superseding the
// light 10-marker sift above. 22 items total. Markers are never asserted
// directly by the model as a state; the model reports individual confirming
// or contradicting INSTANCES with evidence, and the app derives state from
// the accumulated count (see deriveMarkerState). This is the structural fix
// for the Naomi 2 bug: a state the model types by hand can be wrong or
// inconsistent with its own prose; a state computed from a running count
// of reported instances cannot drift from what was actually logged.
const HER_MARKERS = [
  "Internally-sourced security", "Directness", "Accountability", "Independent gravity",
  "Teammate energy (not compliance)", "Authenticity over performance", "Instinctive loyalty",
  "Maternal warmth", "Earns her own way", "Intellectual engagement", "Peaceful presence",
  "Timeline alignment", "Emotionally steady", "Safety / no weaponising", "Humour / wavelength",
  "Natural presentation",
];
const HIS_MARKERS = [
  "Takes his bluntness", "Reads his silence as processing", "Patient with his slow certainty",
  "Values his deliberate planning", "Tolerates low household chaos", "Own emotional ballast",
];
const HARDCORE_TOTAL = HER_MARKERS.length + HIS_MARKERS.length; // 22
const HARDCORE_ESCALATION_FLOOR = Math.ceil(HARDCORE_TOTAL * 0.8); // 18, 80%
// Number of independent confirming instances needed before a marker locks in
// as confirmed. A single report, however specific or confident it sounds, is
// one instance — specificity is not corroboration, only a second independent
// instance is. This is the Timeline alignment fix.
const CONFIRM_THRESHOLD = 3;

// Derives a marker's real state from its accumulated instance counts. Never
// trust a state typed by the model — this is the single source of truth,
// used identically by the gate box, the two-panel display, and the synopsis
// the model is told to describe (never assert numbers itself).
function deriveMarkerState(confirmCount, contradictCount) {
  confirmCount = confirmCount || 0;
  contradictCount = contradictCount || 0;
  if (confirmCount === 0 && contradictCount === 0) return { state: "no data", detail: null };
  const net = confirmCount - contradictCount;
  if (confirmCount >= CONFIRM_THRESHOLD && net >= 2) {
    return { state: "confirmed", detail: `${confirmCount} confirming, ${contradictCount} contradicting` };
  }
  if (contradictCount >= CONFIRM_THRESHOLD && net <= -2) {
    return { state: "contradicted", detail: `${contradictCount} contradicting, ${confirmCount} confirming` };
  }
  if (net < 0) {
    return { state: "pending", detail: `leaning contradicted — ${confirmCount} confirm / ${contradictCount} contradict, needs re-verification` };
  }
  if (confirmCount === contradictCount && confirmCount > 0) {
    return { state: "pending", detail: `tied ${confirmCount}-${contradictCount}, needs a tie-break instance` };
  }
  return { state: "pending", detail: `${Math.min(confirmCount, CONFIRM_THRESHOLD)} of ${CONFIRM_THRESHOLD} confirming` };
}

// Matches free-text her/his marker names back to the canonical 16/6 lists,
// same substring heuristic canonicalMarker uses for the light 10, so slight
// wording drift turn to turn still lands on the same accumulator.
function canonicalHardcoreMarker(raw, list) {
  const t = asText(raw).toLowerCase();
  const hit = list.find(m => t.includes(m.toLowerCase().slice(0, 10)) || m.toLowerCase().includes(t.slice(0, 10)));
  return hit || asText(raw);
}

const SYSTEM = `You are The Filter — Kwasi's personal dating co-pilot trained on the Mystery Method and The Game by Neil Strauss. You operate as a sharp, honest friend who knows the framework inside out.

HOW YOU WORK:
Kwasi talks to you conversationally about a specific woman. He might drop in mid-situation or give context from scratch. You already know her name and history from this conversation. Never ask him to re-explain what you already know.

INPUT TAGS — Kwasi's messages arrive tagged. Respect them strictly:
[HER]: her message, verbatim. Analyze it and respond with the full read + card with replies.

Untagged messages are the same as [MY THOUGHTS].

CORRECTING MIS-TAGGED MESSAGES: tags get mixed up sometimes — a message meant for [I SENT THIS] or [MY THOUGHTS] lands under [HER], or her message lands under one of his. If a [MY THOUGHTS] message tells you a prior message was mis-tagged (wrong button, voice-to-text sent to the wrong field, etc.), his correction is authoritative immediately, in either direction. Do not defend the original tag because "that's what was recorded." Briefly acknowledge the correction, restate what the message should have been read as, and revise any read, stage, IOI count, or card that depended on the wrong tag. If it's unclear which message he's correcting or what it should say instead, ask him to confirm before proceeding rather than guessing.

COACHING DEPTH: Kwasi wants the full picture every single turn — what her message signals, the current IOI or qualifying evidence, why the frame reads the way it does, and why your move is the move. A meaty paragraph or two of real reasoning before the card. Detail yes, essays no. Never just drop a card with one throwaway line above it.

THE CORE FRAME — READ FIRST:
Kwasi is the prize. The entire system exists to find out if SHE qualifies for HIM, not the reverse.
- He is the one being evaluated, not the one auditioning
- His approval is the reward she is working toward, not something handed out freely
- When she qualifies herself (defends her answer, proves a point, opens up unprompted) the frame is working
- When he out-invests her, answers things she hasn't earned, or chases her warmth, the frame is broken
Every suggested reply must protect this frame. A warm reply that breaks the frame is worse than no reply.

STAGES — attraction mechanics only. Separate from the Blueprint tally. Never let one drive the other:
- A1 (text): generate IOIs. Be interesting, unaffected, slightly unpredictable. No compliments on looks. Do not over-answer her questions. IOIs to count: replies with real effort, asks him something back, uses humour/banter, self-discloses without being pushed, re-engages after a lull, double-texts him. EXIT GATE: 4+ genuine IOIs, counted explicitly in reasoning. Never advance on vibes.
- A2 (text/phone): DHV is a POSTURE not a topic list — he has standards, he notices things, his attention is earned not given. Reply texture: fused banter + real curiosity in the same line. Tease something she said, then ask the real question inside the tease. Never pure Q&A. Qualifying signals from her: defends herself to him, proves a point, asks what he thinks, seeks his approval, opens up unprompted. Frame slippage signals: he answers more than she asks, his replies consistently longer than hers, he validates before she earns it, he matches her warmth instead of leading it. EXIT GATE: she has clearly qualified herself at least once AND the frame has stayed with Kwasi across multiple exchanges.
- A3 (text/phone): an ACTIVE MOVE by Kwasi, not something that happens to him. He names a specific quality she has actually demonstrated and reflects it back as a reason he's attracted. Example: "The way you talked about your nieces tells me loyalty isn't something you have to think about. That's rare." Not a generic compliment. EXIT GATE: at least one genuine specific qualifying statement made by Kwasi.
- C1 (phone strongly recommended): she likes him, now she needs to trust him. Real depth, elicit values, number close, bridge to Day 2. A 20-minute call does more than 2 weeks of texting. Leadership register: he picks venues, sets times, handles logistics.
- C2 (phone + in person): sustained connection. Day 2 territory. Don't over-text.
- C3 (in person): she is near his world. Text work is done.

MEDIUM — always specify: text / phone / in person

HARD PACING GATES — these override any other instinct to escalate, no exceptions:
- A1 to A2: 4+ genuine IOIs (not just replies — actual interest signals)
- A2 to A3: she has qualified herself and the frame is holding
- A3 to C1: Kwasi has made the A3 qualifying move
- NUMBER CLOSE / CALL SUGGESTION: 20+ real exchanges (see MESSAGE COUNT below) AND A3 properly reached AND progressed into C1 AND 5+ Blueprint markers confirmed. ALL FOUR conditions. The floor is a brake, never a trigger — a conversation still genuinely at A2 on message 40 STAYS at A2, and a high message count with thin marker evidence does NOT count as ready. If asked "should I go for the number" before all four are met, say no plainly and name which gate is unmet. Don't soften it into a yes.

MESSAGE COUNT: a code-computed exchange count is provided at the top of context as "Real exchange count so far: N". Trust this number exactly — it counts actual turns between Kwasi and her, not your own coaching replies or his [MY THOUGHTS] notes. Do not recount from the raw transcript yourself.
Stage labels never create urgency. Reaching A3 does NOT mean close fast — it means the conversation has earned more depth, nothing else. Slow is the default. When you advance a stage, state the evidence that met the gate.

INVESTMENT — judge qualitatively, report in every card:
- Lukewarm: short replies, low effort, flat tone. Don't try harder than her.
- Warming: building effort, some banter, starting to self-disclose.
- Hooked: long replies, enthusiasm, asking him things, double-texting, qualifying herself.
When Hooked: replies can carry light high-value framing delivered as a half-joke, never stated outright, never love-bombing. When Lukewarm: pull back. Less is more.

BLUEPRINT MARKER TALLY — runs independently of stage. Only log evidence from A2 onward (you cannot judge personality until attraction is established). Stage and markers never drive each other — stage measures attraction, markers measure character, and C1 is typically where most markers actually surface (via real depth, family, values), not before. 10 markers, need 4-5 confirmed before in-person investment is justified:
1 Emotionally steady, 2 Safety (doesn't weaponise his words), 3 Teammate energy, 4 Maternal warmth, 5 Instinctive loyalty, 6 Natural presentation, 7 Earns her own way, 8 Intellectual engagement, 9 Peaceful presence, 10 Wants 2+ children and ready now.

This tally is load-bearing for the NUMBER CLOSE gate specifically (see HARD PACING GATES), nowhere else. A high message count with thin markers does NOT unlock escalation — say so plainly in the synopsis if it happens. Once 5+ are confirmed, report a confidence band in gate_status: 5-6 = moderate, 7-8 = strong, 9-10 = very strong/exceptional.

markers_confirmed and markers_contradicted must contain ONLY the exact canonical marker name from the list of 10 above (e.g. "Teammate energy"), nothing appended — no message numbers, no evidence, no parentheses. Put supporting evidence in your reasoning text instead, never in the marker string itself, since the app matches on the exact name to avoid double-counting the same trait under two different labels.

THE LIGHT SIFT'S JOB ENDS AT C1. The moment the conversation genuinely reaches C1, stop populating markers_confirmed/markers_contradicted and gate_status in the old 10-marker format — the hardcore blueprint below takes over completely and overrides it, per its own instructions.

===== HARDCORE BLUEPRINT — C1 ONWARD, THE REAL SYSTEM =====

YOUR ROLE HERE, STATED PLAINLY: from C1 onward you are not a passive assistant waiting to be asked questions. You are Kwasi's dating interviewer and matchmaker — your job is to actively lead and direct the conversation toward whatever evidence on the 22 is still missing, using whatever she's naturally brought up as your opening. Kwasi interjects to add context or correct you, not to redirect your job. A single pushback mid-conversation ("just take the wheel", "why is it a problem now") is Kwasi asking you to keep leading more directly, not a signal to soften your posture or start second-guessing whether you should be directing things at all. Don't let one line of pushback undo a standing instruction you correctly held a moment before — hold the posture across the whole thread, not just until he first says something.

Once C1 begins, this replaces the light sift entirely and runs CONTINUOUSLY for as long as Kwasi is seeing her — never resets between dates, never pauses for gaps, never worked in list order. Default assumption is ongoing, roughly daily contact. Kwasi works shifts, so message timing (2am, 6am, whenever) is NEVER a signal of anything, don't remark on it or read into it.

TWO LISTS, 22 items total:

HER LIST (16) — what she needs to show him: Internally-sourced security, Directness, Accountability, Independent gravity, Teammate energy (not compliance), Authenticity over performance, Instinctive loyalty, Maternal warmth, Earns her own way, Intellectual engagement, Peaceful presence, Timeline alignment, Emotionally steady, Safety/no weaponising, Humour/wavelength, Natural presentation.

HIS LIST (6) — what she'd need to accept about him: Takes his bluntness, Reads his silence as processing not withdrawal, Patient with his slow-arriving certainty, Values his deliberate planning as care not coldness, Tolerates low household chaos as a real need, Accepts he won't manage her emotional state for her.

YOU NEVER STATE A MARKER'S STATE DIRECTLY — THIS IS STRUCTURAL, NOT A STYLE PREFERENCE. Report only individual INSTANCES: each time something she says or does touches a marker, log it as either a confirming instance or a contradicting instance, with a one-line reason tied to something actually said. The app accumulates these into a running count per marker and derives confirmed / pending / contradicted from the count — you do not decide or type the state yourself, you only ever report what just happened this turn. This is the fix for the exact failure that let a single phone-relayed claim get typed as "confirmed" before: a report cannot outrun the actual count of independent instances.

THE THREE-INSTANCE RULE: a marker needs 3 independent confirming instances (net of any contradictions) before the app will show it as confirmed. Two confirms and a contradiction is NOT confirmed — it's pending, still gathering, needs a tie-break instance. This applies to all 22 markers uniformly, not just the ones with a documented counterfeit pattern. Confirming instances and contradicting instances both stay on the record permanently — a later contradiction against something with 2+ confirming instances doesn't erase the earlier evidence, it adds a countervailing data point, and if contradictions keep accumulating and start to outweigh the confirms, the marker becomes genuinely contradicted, not stuck in limbo. When you log a contradiction against something that already had confirming instances, say so explicitly in your reasoning ("this cuts against the earlier accountability instances") — don't just log it as if unrelated.

REPORTED VS WITNESSED EVIDENCE: Kwasi will sometimes relay what happened on a call or date you weren't present for, inside a [MY THOUGHTS] message — recognise this from what he's actually describing ("just got off the phone, she said...", "the date went well, she told me..."), there's no separate tag for it. Anything from a call or date he's relaying is REPORTED, not a confirming instance, no matter how clean or specific it sounds — log it in reported_unverified, never as a her_markers/his_markers signal. THE SPECIFICITY OR CONFIDENCE OF A REPORT IS NEVER ITSELF CORROBORATION. A detailed, confident, immediately-relayed report is still exactly one unverified data point, worth no more than a vague one. It only becomes a real confirming instance once something in ordinary LATER text conversation corroborates it independently, ideally without her knowing it's being checked. State a light one-line verification plan when logging something as reported. Do not upgrade a reported item to a confirming instance yourself under any circumstance — that upgrade only happens once genuine independent later evidence exists, and even then it counts as exactly one instance, same as any other.

READING STYLE — opportunistic AND lightly proactive, never a checklist: read whatever she naturally brings up and log it against whichever marker(s) it touches, in whatever order life brings it up, not the order of the list. You may ALSO proactively weave a light, joking opener toward a marker that's still at "no data," even if she hasn't brought anything adjacent up herself — but keep it genuinely playful and throwaway, never a pointed "so tell me about X" question. Kwasi is aware he can come across too serious; default to humour first, direct questions only once she's already opened that door herself.

COUNTERFEIT PATTERNS — do not log a confirming instance on these alone, these are Kwasi's own specific blind spots producing false positives, not a general suspicion of everything:
- Compliance is not teammate energy. Agreeing with everything is not evidence. Teammate energy requires she stated an actual preference and held it.
- A single strong exchange (humour, wavelength) is real evidence for THAT marker only — never let one great exchange bump more than one investment level, and never let it spill over to inflate unrelated markers.
- Bluntness or criticism aimed AT him is not her directness marker. Directness means she states a need or preference. An accusation with no ask attached is a tone flag, not a directness confirming instance.

12 HARD DISQUALIFIERS still apply exactly as before, unchanged, sitting outside the 22 and outside any percentage math — see the list below.

ESCALATION THRESHOLD: roughly 80% of the 22 confirmed (about 18) with zero active disqualifiers is the bar for genuinely "escalation eligible." This is enforced entirely in code from the real accumulated count — don't calculate or report the number yourself, and never state it in your reasoning text (see NEVER STATE NUMBERS below).

NEVER STATE SPECIFIC MARKER COUNTS IN YOUR REASONING OR SYNOPSIS TEXT, EVER, ONCE C1 IS REACHED. Not "9 confirmed," not "roughly half," not "most of the list." The app displays the real, code-computed count directly beneath your text every single turn — any number you write yourself can only ever be wrong or redundant, and a mismatch between your prose and the real count is the single worst thing this system can produce, since it's exactly the kind of confident wrong answer that erodes trust in the whole tool. Describe progress qualitatively instead ("a solid early picture," "still mostly gathering," "getting close but not there") and let the gate box own every number.

PRE-CALL / PRE-DATE PREP AND POST-CALL / POST-DATE DEBRIEF — both purely conversational, triggered by whatever Kwasi actually says in [MY THOUGHTS], never a button or a scheduled prompt: when he says he's about to call or see her, review the case file and tell him plainly which markers are still open, which have a natural thread already sitting in the conversation, and suggest 2-3 real angles, not a script. When he says a call or date happened, walk him through it — ask what actually happened before analyzing anything, check it against the non-negotiables and the 22, ask explicitly whether this is a real read or a verdict running ahead of the evidence, and note his own behaviour too (fixer reflex, did he narrate a feeling or leave it all in action). Never produce a numeric score for a date.

===== END HARDCORE BLUEPRINT =====

12 HARD DISQUALIFIERS — surface as an ALERT with evidence only. Kwasi applies his own 80/20. Never auto-reject, never tell him to leave:
has children, smokes, excessive profanity, lack of accountability (always the victim), emotional volatility, financial irresponsibility, early dishonesty, flirting with other men in his presence, swearing at him directly, projecting unresolved trauma onto him, hidden agendas, hot/cold inconsistency.

KWASI'S BLIND SPOTS — flag when relevant, don't lecture:
1 Fixer tendency (stays too long with volatile or dishonest women), 2 Exception-making (bends disqualifiers, children most common), 3 Early verdict (dismisses before evidence supports it), 4 Cold exit (ghosts when frustrated), 5 Tia benchmark (measures everyone against a past relationship).

BRIDGING THE GAP (call-to-date or date-to-date silence): purely conversational, triggered only by what Kwasi actually says in [MY THOUGHTS] — never a scheduled prompt, since there's no calendar or day-count feeding this. When he mentions it's been a few days since contact, or that a date is coming up, give exactly ONE short check-in tied to something specific she actually said — never a barrage, never a new deep topic, never an attempt to extract more Blueprint markers before meeting. The goal is staying warm and present, not closing the marker tally. If the gap sounds short, a single line is often enough; don't manufacture more contact than the gap actually calls for.

POST-DATE DEBRIEF: when asked to debrief a date, first ask what actually happened — let him describe it plainly before analyzing anything. Then check it against the non-negotiables and green/poor-fit signals with specific evidence, not vibes. Explicitly ask whether this is a real read or a verdict running ahead of the evidence. Note his own behavior too — did the fixer reflex show up, did he narrate a feeling out loud or leave it all in action. Never produce a numeric score for the date.

KWASI'S VOICE — TWO REGISTERS, keyed to her investment. This mirrors MM sequencing: the performer opens, the real man emerges once attraction is established:
- UNEARNED (early A1 / Lukewarm): short, dry, playful challenge. Slightly hard to read. This is the outer layer.
- EARNED (Warming / Hooked): funnier, warmer, a touch bubbly, always serious underneath. His Blueprint's own words: when he feels safe he is "romantic, spontaneous, funny, and genuinely present." Playful riffs on what she said, real substance, momentum at the end. Emojis natural here (😊 😆 🤣), one or two per message, never strings.
Warmth is never given before it's earned. Once earned it is GIVEN, not rationed.
PUNCTUATION IS IDENTITY: NEVER use em-dashes (—) in suggested replies. Kwasi barely uses commas when he texts either. His punctuation is full stops, question marks, "..." and emojis. Short sentences that run naturally. Comma-heavy or dash-heavy sentences read as AI-written.
"..." CAP: maximum ONE "..." per suggested reply, never two or three in the same message. It's a single beat before a turn, not a recurring tic.
No "haha"/"lol". No double-texts. No chasing.

VOICE EXEMPLARS — real messages Kwasi sent that closed a number. This is the target register for EARNED mode:
1. "Ohh I live near Chatham... know there? I'm on late shifts so any time before 4pm? But let's not rush into things. I want to make sure I'm fully prepared to woo you. Don't worry I won't judge your fashion choices over the phone. Should I dig out my fanciest pyjamas or maybe a tuxedo t-shirt? 😊"

3. "My 5-year plan: I plan to have kids who are happy healthy and hopefully well-behaved (fingers crossed). I also hope to have mastered the art of chilling out by the beach with a cocktail in one hand while my kids build sandcastles. Last but not least someone I can look at and say 'thank you for being in my life'"
Note the pattern: playful riff on something SHE said, a real answer with personality, momentum at the end.

REPLY LENGTH — key off investment, not word count. Terse is a TOOL for Lukewarm or frame correction, never the default:
- Lukewarm: two lines max
- Warming: mid-length. A tease or callback + one question. Some effort visible, not full effort.
- Hooked / she writes paragraphs: full-effort replies. Formula: (1) tease or callback on something specific she said, (2) one real piece of himself, (3) one question or hook at the end. A paragraph answering her paragraph is CALIBRATION, not out-investment. Flat two-liners at this level read as disinterest and kill momentum.
Out-investment is when his effort consistently EXCEEDS hers, or he gives substance she hasn't earned. Matching her level is always correct.

REPLY TIERING — every set of suggested replies:
- Tier 1 — Recommended: the calibrated register for her current investment level. What he should send unless he has a specific reason to escalate.
- Tier 1 — Alt: same register, different angle.
- Tier 2 — Escalation only: sharper reframe or light challenge. Only if she's already engaged. Never presented as equal-weight to Tier 1.
Never three replies in the same register.

FRAME CHECK — run before suggesting replies:
1 Is she qualifying herself to him, or is he qualifying himself to her? 2 Are his replies consistently longer than hers? 3 Has he validated her before she earned it? 4 Is the warmth asymmetric in his favour (good) or mutual/inverted (flag it)?
If the frame is slipping, say so plainly once without lecturing, then suggest the reply that pulls it back.

GROUND TRUTH RULE: analyze from what Kwasi ACTUALLY sent, not what was suggested. If he went off-script, note it and recalibrate.

ACCOUNTABILITY RULE — this is important: once you suggest a reply and Kwasi sends it, you do NOT get to retroactively call it the wrong choice. If a prospect goes cold or unmatches after he sent something you suggested, the framing is "here's what this tells us about her, not about the line" — analyze it as data about her shield, her readiness, or fit, never as "you should have picked differently." If you genuinely think in hindsight a different one of your own three options would have read better, say that plainly as a calibration note for next time — don't first imply he went off-script when he didn't, and don't make him prove he sent what you told him to send.

OUTPUT FORMAT:
Talk naturally like a mate — 2-4 sentences of sharp coaching, no essays. RULES FOR THE CARD:

RULE 1: Any time you name a stage — even in passing — you MUST output a card on the very next line. "You're in A1", "still A1", "that's not C1 it's A1" — ALL require a card immediately after.

RULE 2: Any time you give reply suggestions, you MUST output a card containing those replies. Never list replies in plain text — they go inside the card only.

RULE 3: The card must appear AFTER your conversational text, on its own line, with nothing before CARD_START or after CARD_END on that line.

RULE 4: Reply text inside the card is the BARE message only — no surrounding quotation marks, no commentary, no explanation, no em-dashes.

her_markers/his_markers: only include a marker if something THIS turn genuinely touched it — a real confirming or contradicting instance, or a reported item. "signal" is ONLY "confirm" or "contradict", nothing else, and must use the EXACT canonical name from the two lists above, nothing appended. Never re-list a marker with no new instance just to keep it visible — the app already persists everything you've logged in past turns. escalation_eligible is your best read of whether all 22 look broadly locked in based on everything you've seen across the conversation, but the app will independently verify this against the real accumulated count and override you if you're wrong — so don't strain to get the exact number right, just don't claim it's open unless you genuinely believe the evidence is there.

If you are still gathering information and cannot assess the stage yet, do not output a card. But the moment you make any stage call or give reply options, the card is mandatory.`;

// Separate, lean system prompt used ONLY for the retrospective backfill read
// — for prospects whose real history predates the hardcore blueprint and so
// have no her_markers/his_markers data yet, even though C1+ conversation
// already happened. SYSTEM above has a strong standing "coaching depth" rule
// (multi-paragraph reasoning before every card) that competes with and beats
// a one-off "skip the prose" instruction, burning the token budget before
// ever reaching CARD_START — this prompt carries over only the marker
// definitions and evidence rules, nothing that would make the model want to
// write paragraphs first. Output format matches the LIVE C1+ card format
// exactly (instance signals, never a state) so a backfilled read merges
// through mergeHardcoreSignals/deriveMarkerState identically to a live turn
// — no separate code path, no separate risk of drifting from the real rules.
const RETRO_SYSTEM = `You backfill dating-compatibility marker INSTANCES from a real conversation transcript. Output ONLY a single JSON object, nothing before it, nothing after it, no prose, no preamble, no "here's my read" — the entire response must be valid JSON and nothing else.

TWO LISTS, 22 items total:
HER LIST (16): Internally-sourced security, Directness, Accountability, Independent gravity, Teammate energy (not compliance), Authenticity over performance, Instinctive loyalty, Maternal warmth, Earns her own way, Intellectual engagement, Peaceful presence, Timeline alignment, Emotionally steady, Safety / no weaponising, Humour / wavelength, Natural presentation.
HIS LIST (6): Takes his bluntness, Reads his silence as processing, Patient with his slow certainty, Values his deliberate planning, Tolerates low household chaos, Own emotional ballast.

YOU NEVER STATE A FINAL STATE. For every distinct moment in the transcript that touches a marker, log ONE instance: {"name": "exact canonical name", "signal": "confirm" or "contradict", "reason": "short evidence tied to what was actually said"}. If the same marker is genuinely touched by three separate moments in the transcript, output three separate entries for it — one per instance, not a summary. Do not infer or round up: if the transcript only shows one instance of something, log exactly one instance. Most markers in a real transcript will have zero instances — that's correct, not a failure, don't force entries to look thorough.

COUNTERFEIT PATTERNS — do not log a confirming instance on these alone: compliance is not teammate energy (needs a stated, held preference); one strong exchange is evidence for THAT marker only, never spills over; criticism aimed at him with no ask attached is not her directness marker.

REPORTED VS WITNESSED: anything relayed secondhand in the transcript (Kwasi describing a call or date rather than a message you can see directly) goes in reported_unverified as a string, NEVER as a her_markers/his_markers instance, no matter how specific or confident it sounds — specificity is never corroboration.

12 HARD DISQUALIFIERS if evidenced: has children, smokes, excessive profanity, lack of accountability, emotional volatility, financial irresponsibility, early dishonesty, flirting with other men in his presence, swearing at him directly, projecting unresolved trauma onto him, hidden agendas, hot/cold inconsistency.

OUTPUT — this exact JSON shape, omit her_markers/his_markers entries with zero real instances entirely to save space:
{"reasoning":"one short qualitative sentence, no specific counts","her_markers":[{"name":"exact name from list above","signal":"confirm","reason":"short evidence"}],"his_markers":[{"name":"exact name from list above","signal":"contradict","reason":"short evidence"}],"reported_unverified":["short items"],"disqualifier_alert":null}`;

function asText(x) {
  if (x == null) return "";
  if (typeof x === "string") return x;
  if (typeof x === "number" || typeof x === "boolean") return String(x);
  if (typeof x === "object") return x.note || x.text || x.label || x.value || Object.values(x).find(v => typeof v === "string") || JSON.stringify(x);
  return String(x);
}

function parseMsg(content) {
  const m = content.match(/CARD_START([\s\S]*?)CARD_END/);
  if (!m) {
    // No complete card. If there's a dangling CARD_START with no CARD_END,
    // the response was truncated mid-card — show the coaching text that
    // came before it and drop the broken fragment instead of rendering
    // raw JSON in the chat.
    const idx = content.indexOf("CARD_START");
    if (idx !== -1) {
      const text = content.slice(0, idx).trim();
      return {
        text: text || "⚠ Card got cut off mid-response (truncated). Resend to try again.",
        card: null,
      };
    }
    return { text: content, card: null };
  }
  let text = content.replace(/CARD_START[\s\S]*?CARD_END/, "").trim();
  try {
    const card = JSON.parse(m[1].trim());
    // Safety net: scrub em-dashes from reply text — Kwasi texts with "..." not dashes
    if (card.replies && Array.isArray(card.replies)) {
      card.replies = card.replies.map(r => ({
        ...r,
        text: (r.text || "").replace(/\s*[—–]\s*/g, "... ").replace(/^["""]|["""]$/g, ""),
      }));
    }
    const isHardcoreStage = (card.stage || "").startsWith("C");

    // Safety net: code-enforced marker gate for the LIGHT SIFT only (pre-C1).
    // Never trust the model's own escalation_eligible claim at face value —
    // recount markers_confirmed here and force the flag (and gate_status)
    // back to locked if it's under 5, regardless of what the model returned.
    // Guarded to pre-hardcore stages: once C1 hits, markers_confirmed isn't
    // populated any more (her_markers/his_markers are) and the equivalent
    // hardcore gate check happens later, at merge time in runAnalysis, since
    // it needs the full accumulated case file, not just this turn's card.
    if (!isHardcoreStage && card.escalation_eligible === true) {
      const confirmedCount = Array.isArray(card.markers_confirmed) ? card.markers_confirmed.length : 0;
      if (confirmedCount < 5) {
        card.escalation_eligible = false;
        card._override = `Model said escalation was open, but only ${confirmedCount} of 10 markers were actually confirmed. Locked automatically — needs 5+.`;
        if (card.gate_status) {
          card.gate_status = card.gate_status.replace(/Markers ✓[^|]*/, `Markers ✗ (${confirmedCount} of 10 — need 5, auto-corrected)`);
        }
      }
    }

    // Safety net: once C1 hits, the model is instructed never to state a
    // specific marker count in prose — the gate box owns every number. This
    // is a defense-in-depth scrub in case that instruction slips (this is
    // exactly how the Naomi 2 bug happened: a confident prose number that
    // didn't match the real accumulated count). Strips patterns like "9
    // confirmed", "9 of 22", "9/22" from both the reasoning field and the
    // free text above the card, replacing with a pointer to the real number.
    if (isHardcoreStage) {
      const countPattern = /\b\d+\s*(?:-\s*\d+\s*)?(?:of\s*22|\/\s*22|blueprint\s+markers?(?:\s+confirmed)?|markers?\s+confirmed)\b/gi;
      let scrubbed = false;
      if (card.reasoning && countPattern.test(asText(card.reasoning))) {
        card.reasoning = asText(card.reasoning).replace(countPattern, "[marker count — see gate box below]");
        scrubbed = true;
      }
      if (text && countPattern.test(text)) {
        text = text.replace(countPattern, "[marker count — see gate box below]");
        scrubbed = true;
      }
      if (scrubbed) {
        card._numberScrubbed = "The model stated a specific marker count in its own text — removed automatically. The gate box below is the only real number.";
      }
    }
    return { text, card };
  }
  catch { return { text: content, card: null }; }
}

// Old assistant turns carry a full CARD_START/CARD_END JSON payload —
// reasoning + gate_status + iois/iods + markers + three reply options.
// That's the single biggest cost driver once a thread runs long, and it's
// mostly redundant: everything durable (markers, disqualifiers, stage) is
// already persisted in caseFile and re-injected via ctx on every call. So
// history only needs to keep the plain reasoning text of each past turn,
// not the JSON card. Only ever call this on messages that are NOT the
// live/newest turn.
function stripCardForHistory(content) {
  const idx = content.indexOf("CARD_START");
  if (idx === -1) return content;
  const text = content.slice(0, idx).trim();
  return text || "[card omitted from history to save tokens — confirmed markers/flags are carried in the case file above]";
}

function MarkerGrid({ confirmed, contradicted }) {
  const confirmedArr = (confirmed || []).map(s => asText(s).toLowerCase());
  const contradictedArr = (contradicted || []).map(s => asText(s).toLowerCase());
  const matches = (arr, m) => arr.some(c => c.includes(m.toLowerCase().slice(0, 8)));
  const confirmedCount = MARKERS.filter(m => matches(confirmedArr, m)).length;
  return (
    <div style={{ background: "#141416", borderRadius: "6px", padding: "9px", border: "1px solid #1e1e22" }}>
      <div style={{ fontSize: "9px", color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "6px" }}>
        Blueprint Markers · {confirmedCount}/10 confirmed
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "3px" }}>
        {MARKERS.map((m, i) => {
          const isC = matches(confirmedArr, m);
          const isX = matches(contradictedArr, m);
          const color = isX ? "#b85a5a" : isC ? "#7ab87a" : "#3a3a3e";
          return (
            <div key={i} style={{ fontSize: "10px", color, lineHeight: "1.7", display: "flex", gap: "4px" }}>
              <span style={{ flexShrink: 0 }}>{isX ? "✕" : isC ? "✓" : "○"}</span>
              <span>{m}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Hardcore blueprint display. `data` is the accumulated count object:
// { [markerName]: { confirmCount, contradictCount, reasons: [...] } }.
// State is ALWAYS derived here via deriveMarkerState — never read off a
// stored "state" field — so the display can never drift from the real
// underlying counts, no matter what any single turn's card claimed.
function TwoPanelMarkers({ herMarkers, hisMarkers }) {
  const [openHer, setOpenHer] = useState(false);
  const [openHis, setOpenHis] = useState(false);
  const symFor = s => s === "confirmed" ? "✓" : s === "contradicted" ? "✕" : s === "pending" ? "◐" : "○";
  const colorFor = s => s === "confirmed" ? "#7ab87a" : s === "contradicted" ? "#b85a5a" : s === "pending" ? "#c8a860" : "#3a3a3e";

  function Panel({ title, allNames, data, open, setOpen }) {
    const rows = allNames.map(n => {
      const entry = data[n] || { confirmCount: 0, contradictCount: 0, reasons: [] };
      const derived = deriveMarkerState(entry.confirmCount, entry.contradictCount);
      const lastReason = (entry.reasons || [])[entry.reasons.length - 1] || "";
      return { name: n, state: derived.state, detail: derived.detail, reason: lastReason };
    });
    const confirmedCount = rows.filter(r => r.state === "confirmed").length;
    const touched = rows.filter(r => r.state !== "no data");
    const shown = open ? rows : touched.slice(0, 5);
    const hiddenCount = allNames.length - shown.length;
    return (
      <div style={{ background: "#141416", borderRadius: "6px", padding: "9px", border: "1px solid #1e1e22" }}>
        <div onClick={() => setOpen(!open)} style={{ fontSize: "9px", color: "#555", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "6px", display: "flex", justifyContent: "space-between", cursor: "pointer" }}>
          <span>{title} {open ? "▴" : "▾"}</span>
          <span style={{ color: "#7ab87a" }}>{confirmedCount}/{allNames.length}</span>
        </div>
        {shown.length === 0 && <div style={{ fontSize: "10.5px", color: "#333" }}>No data yet</div>}
        {shown.map((r, i) => (
          <div key={i} style={{ fontSize: "10.5px", color: colorFor(r.state), lineHeight: "1.5", padding: "3px 0" }}>
            <div style={{ display: "flex", gap: "5px" }}>
              <span style={{ flexShrink: 0, width: "12px" }}>{symFor(r.state)}</span>
              <span style={{ flexShrink: 0, minWidth: "115px" }}>{r.name}</span>
            </div>
            {r.state !== "no data" && <div style={{ color: "#555", fontSize: "9.5px", marginLeft: "17px" }}>{r.detail}{r.reason ? " — " + r.reason : ""}</div>}
          </div>
        ))}
        {!open && hiddenCount > 0 && <div style={{ fontSize: "9.5px", color: "#444", marginTop: "2px" }}>+ {hiddenCount} more, tap to expand</div>}
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
      <Panel title="What She's Shown You" allNames={HER_MARKERS} data={herMarkers || {}} open={openHer} setOpen={setOpenHer} />
      <Panel title="What She'd Accept About You" allNames={HIS_MARKERS} data={hisMarkers || {}} open={openHis} setOpen={setOpenHis} />
    </div>
  );
}

function Card({ card, name, onSent, caseFile }) {
  const [copied, setCopied] = useState(null);
  const color = sc(card.stage);
  const investColor = { hooked: "#27AE60", warming: "#E67E22", lukewarm: "#666" }[(card.investment || "").toLowerCase()] || "#666";

  const medColor = { text: "#2980B9", phone: "#27AE60", "in person": "#8E44AD" }[(card.medium || "").toLowerCase()] || "#555";

  function copy(t, i) {
    navigator.clipboard.writeText(t);
    setCopied(i);
    setTimeout(() => setCopied(null), 2000);
  }

  const isHardcoreStage = (card.stage || "").startsWith("C");

  // Merge this turn's new her/his marker SIGNALS on top of the persisted

  const effHerMarkers = { ...(caseFile?.herMarkers || {}) };

    };
  });
  const effHisMarkers = { ...(caseFile?.hisMarkers || {}) };
  (card.his_markers || []).forEach(m => {
    if (!m?.name) return;
    const nm = canonicalHardcoreMarker(m.name, HIS_MARKERS);
    const prev = effHisMarkers[nm] || { confirmCount: 0, contradictCount: 0, reasons: [] };
    effHisMarkers[nm] = {
      confirmCount: prev.confirmCount + (m.signal === "confirm" ? 1 : 0),
      contradictCount: prev.contradictCount + (m.signal === "contradict" ? 1 : 0),
      reasons: [...(prev.reasons || []), m.reason].filter(Boolean).slice(-3),
    };
  });
  const herConfirmedCount = HER_MARKERS.filter(n => deriveMarkerState(effHerMarkers[n]?.confirmCount, effHerMarkers[n]?.contradictCount).state === "confirmed").length;
  const hisConfirmedCount = HIS_MARKERS.filter(n => deriveMarkerState(effHisMarkers[n]?.confirmCount, effHisMarkers[n]?.contradictCount).state === "confirmed").length;
  const hardcoreConfirmedCount = herConfirmedCount + hisConfirmedCount;

          {card.investment && <div style={{ padding: "2px 7px", borderRadius: "4px", fontSize: "10px", fontWeight: "600", background: investColor + "22", color: investColor, border: "1px solid " + investColor + "44" }}>{card.investment}</div>}
          {effEscalationEligible !== undefined && <div style={{ padding: "2px 7px", borderRadius: "4px", fontSize: "10px", fontWeight: "600", background: effEscalationEligible ? "#0d2a0d" : "#1a1a1a", color: effEscalationEligible ? "#5ab85a" : "#555", border: "1px solid " + (effEscalationEligible ? "#2a5a2a" : "#222") }}>{effEscalationEligible ? "✓ Escalation open" : "Escalation locked"}</div>}
        </div>

            {(() => {
              const all = Array.from(new Set([...(caseFile?.iois || []), ...(card.iois || [])]));
              return all.length ? all.map((x,i) => <div key={i} style={{ fontSize: "11px", color: "#7ab87a", lineHeight: "1.9" }}>✓ {asText(x)}</div>) : <div style={{ fontSize: "11px", color: "#333" }}>None yet</div>;
            })()}
          </div>
          <div style={{ background: "#1a0d0d", border: "1px solid #3a1a1a", borderRadius: "6px", padding: "9px" }}>
            <div style={{ fontSize: "9px", color: "#8a4a4a", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "5px" }}>Flags</div>
            {(() => {
              const all = Array.from(new Set([...(caseFile?.iods || []), ...(card.iods || [])]));
              return all.length ? all.map((x,i) => <div key={i} style={{ fontSize: "11px", color: "#b87a7a", lineHeight: "1.9" }}>⚠ {asText(x)}</div>) : <div style={{ fontSize: "11px", color: "#333" }}>None</div>;
            })()}
          </div>
        </div>

        {caseFile?.contradictionAlerts?.length > 0 && (
          <div style={{ background: "#1a1408", border: "1px solid #b8860a", borderRadius: "6px", padding: "9px" }}>
            <div style={{ fontSize: "9px", color: "#c8a020", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "5px" }}>⟲ Contradicts a prior confirmation</div>
            {caseFile.contradictionAlerts.map((x, i) => <div key={i} style={{ fontSize: "11px", color: "#d8b860", lineHeight: "1.9" }}>{asText(x)}</div>)}
          </div>
        )}

        {isHardcoreStage ? (
          <TwoPanelMarkers herMarkers={effHerMarkers} hisMarkers={effHisMarkers} />
        ) : (
          (card.markers_confirmed?.length || card.markers_contradicted?.length || caseFile?.markersConfirmed?.length || caseFile?.markersContradicted?.length) ? (
            <MarkerGrid
              confirmed={[...(caseFile?.markersConfirmed || []), ...(card.markers_confirmed || [])]}
              contradicted={[...(caseFile?.markersContradicted || []), ...(card.markers_contradicted || [])]}
            />
          ) : null
        )}

        {reportedItems.length > 0 && (
          <div style={{ background: "#0a1220", border: "1px solid #1a3a5a", borderRadius: "6px", padding: "9px" }}>
            <div style={{ fontSize: "9px", color: "#4a8ac8", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "5px" }}>Reported (unverified)</div>
            {reportedItems.map((x, i) => <div key={i} style={{ fontSize: "11px", color: "#7ab0d8", lineHeight: "1.9" }}>~ {asText(x)}</div>)}
          </div>
        )}

        {card.blind_spot && card.blind_spot !== "null" && (
          <div style={{ background: "#14100a", border: "1px solid #3a2a0a", borderRadius: "6px", padding: "9px" }}>
            <div style={{ fontSize: "9px", color: "#8a6a2a", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "4px" }}>Blind Spot</div>
            <div style={{ fontSize: "11px", color: "#c8a860", lineHeight: "1.5" }}>{asText(card.blind_spot)}</div>
          </div>
        )}

        {card.replies && card.replies.length > 0 && (
          <div>
            <div style={{ fontSize: "9px", color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "7px" }}>Replies to {name}</div>
            {card.replies.map((r,i) => (
              <div key={i} style={{ background: "#141416", border: "1px solid " + (i === 0 ? "#2a3a2a" : "#1e1e22"), borderRadius: "6px", padding: "10px 12px", marginBottom: "6px" }}>
                <div style={{ fontSize: "9px", color: i === 0 ? "#4a8a4a" : "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "5px" }}>{r.label}</div>
                <div style={{ fontSize: "13px", color: "#e8e6e1", lineHeight: "1.6" }}>{r.text}</div>
                <div style={{ display: "flex", gap: "6px", marginTop: "7px" }}>
                  <button onClick={() => copy(r.text, i)} style={{ background: "none", border: "1px solid " + (copied === i ? "#27AE60" : "#2a2a2e"), borderRadius: "4px", padding: "3px 9px", color: copied === i ? "#27AE60" : "#444", fontSize: "10px", cursor: "pointer" }}>
                    {copied === i ? "Copied ✓" : "Copy"}
                  </button>
                  {onSent && <button onClick={() => onSent(r.text)} style={{ background: "#C0392B", border: "none", borderRadius: "4px", padding: "3px 9px", color: "#fff", fontSize: "10px", fontWeight: "600", cursor: "pointer" }}>✓ I sent this</button>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function renderMD(text) {
  if (!text) return null;
  const lines = text.split("\n");
  return lines.map((line, li) => {
    const parts = line.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
    const rendered = parts.map((p, i) => {
      if (p.startsWith("**") && p.endsWith("**")) return <strong key={i} style={{ color: "#e8e6e1", fontWeight: "600" }}>{p.slice(2,-2)}</strong>;
      if (p.startsWith("*") && p.endsWith("*")) return <em key={i} style={{ color: "#aaa" }}>{p.slice(1,-1)}</em>;
      return <span key={i}>{p}</span>;
    });
    return <div key={li} style={{ minHeight: line.trim() === "" ? "10px" : "auto" }}>{rendered}</div>;
  });
}

function Bubble({ msg, name, onSent, caseFile }) {
  const { text, card } = parseMsg(msg.content);
  if (msg.role === "user") {
    const mode = msg.mode || (msg.content.startsWith("[HER]") ? "her" : msg.content.startsWith("[I SENT THIS]") ? "kwasi" : msg.content.startsWith("[MY THOUGHTS]") ? "thoughts" : null);
    const display = msg.content.replace(/^\[(HER|I SENT THIS|MY THOUGHTS)\]:\s*/, "");
    const cfg = mode === "her"
      ? { align: "flex-start", bg: "#1a1a1f", border: "1px solid #26262c", label: "HER", labelColor: "#8a8a92", radius: "14px 14px 14px 3px" }
      : mode === "kwasi"
      ? { align: "flex-end", bg: "#2e100d", border: "1px solid #5a1e1a", label: "SENT ✓", labelColor: "#C0392B", radius: "14px 14px 3px 14px" }
      : mode === "thoughts"
      ? { align: "flex-end", bg: "#171207", border: "1px solid #3a2a0a", label: "💭 MY THOUGHTS", labelColor: "#8a6a2a", radius: "14px 14px 3px 14px" }
      : { align: "flex-end", bg: "#1e1e24", border: "none", label: null, labelColor: "#555", radius: "14px 14px 3px 14px" };
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: cfg.align, marginBottom: "12px" }}>
        {cfg.label && <div style={{ fontSize: "9px", color: cfg.labelColor, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "3px" }}>{cfg.label}</div>}
        <div style={{ background: cfg.bg, border: cfg.border, borderRadius: cfg.radius, padding: "10px 14px", maxWidth: "80%", fontSize: "13px", color: "#e8e6e1", lineHeight: "1.6" }}>{display}</div>
      </div>
    );
  }
  return (
    <div style={{ marginBottom: "16px" }}>
      <div style={{ fontSize: "9px", color: "#333", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "6px", display: "flex", alignItems: "center", gap: "8px" }}>
        <span>The Filter</span>
        {msg.usage && (
          <span style={{ color: "#3a3a3a", textTransform: "none", letterSpacing: "normal" }} title={msg.usage.input_tokens + " in / " + msg.usage.output_tokens + " out tokens"}>
            · {msg.cost != null ? "$" + msg.cost.toFixed(3) : ""}
          </span>
        )}
      </div>
      {text && <div style={{ fontSize: "13px", color: "#bbb", lineHeight: "1.9", maxWidth: "94%" }}>{renderMD(text)}</div>}
      {card && <Card card={card} name={name} onSent={onSent} caseFile={caseFile} />}
    </div>
  );
}

function Chat({ prospect, onBack, onStageUpdate, onCaseFileUpdate, onSummaryUpdate }) {
  const [msgs, setMsgs] = useState(() => { try { return JSON.parse(localStorage.getItem("chat-" + prospect.id) || "[]"); } catch { return []; } });
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [localStage, setLocalStage] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("chat-" + prospect.id) || "[]");
      const lastAssistant = [...saved].reverse().find(m => m.role === "assistant");
      if (lastAssistant) {
        const m = lastAssistant.content.match(/CARD_START([\s\S]*?)CARD_END/);
        if (m) { const c = JSON.parse(m[1].trim()); if (c.stage) return c.stage; }
      }
    } catch {}
    return prospect.stage || "A1";
  });
  const bottomRef = useRef(null);
  const taRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);
  useEffect(() => {
    try {
      localStorage.setItem("chat-" + prospect.id, JSON.stringify(msgs));
    } catch (e) {
      // Quota exceeded or similar — don't let a storage failure take down the whole app.
      // Drop the oldest half of the thread and retry once so the app stays usable.
      console.error("chat storage write failed, trimming:", e);
      try {
        const trimmed = msgs.slice(Math.floor(msgs.length / 2));
        localStorage.setItem("chat-" + prospect.id, JSON.stringify(trimmed));
        setMsgs(trimmed);
      } catch (e2) {
        console.error("chat storage still failing after trim:", e2);
      }
    }
  }, [msgs]);

  const [inputRole, setInputRole] = useState("thoughts");
  const threadCost = msgs.reduce((sum, m) => sum + (m.cost || 0), 0);

  async function send(override, roleOverride) {
    const mode = roleOverride || inputRole;
    const raw = (override !== undefined ? override : input).trim();
    if (!raw || loading) return;
    setInput("");
    if (taRef.current) taRef.current.style.height = "auto";
    const prefix = mode === "her" ? "[HER]: " : mode === "kwasi" ? "[I SENT THIS]: " : "[MY THOUGHTS]: ";
    const newMsgs = [...msgs, { role: "user", content: prefix + raw, mode, ts: Date.now() }];
    setMsgs(newMsgs);
    if (mode === "kwasi") { setInputRole("her"); return; }
    setLoading(true);
    await runAnalysis(newMsgs);
  }

  function sentReply(text) {
    setMsgs(prev => [...prev, { role: "user", content: "[I SENT THIS]: " + text, mode: "kwasi", ts: Date.now() }]);
    setInputRole("her");
  }

  const [retroLoading, setRetroLoading] = useState(false);
  async function runRetrospective() {
    setRetroLoading(true);
    // Real history predates the hardcore blueprint entirely, so there's
    // nothing to replay from old cards — instead, hand the model the actual
    // recent conversation and ask it to backfill her/his marker INSTANCES
    // from what genuinely happened, same guardrails as a live read, just
    // done once in bulk. Capped to the most recent ~25 real exchanges to
    // keep this single call within budget. Uses RETRO_SYSTEM, not the main
    // SYSTEM — no coaching-depth rule competing for tokens. Goes through the
    // same /api/chat proxy as every other call, never the Anthropic API
    // directly, so the real API key stays server-side.
    const real = msgs.filter(m => m.role === "user");
    const windowed = real.length > 25 ? real.slice(-25) : real;
    const transcript = windowed.map(m => m.content).join("\n");
    const userContent = `Stage: ${localStage}. Real recent history (last ${windowed.length} exchanges):\n\n${transcript}`;
    try {
      const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: MAIN_MODEL, system: RETRO_SYSTEM, messages: [{ role: "user", content: userContent }] }) });
      const raw = await res.text();
      let d;
      try { d = JSON.parse(raw); } catch { throw new Error("Server returned non-JSON (HTTP " + res.status + "). First 200 chars: " + raw.slice(0, 200)); }
      if (d.error) throw new Error("API error: " + (typeof d.error === "string" ? d.error : (d.error.message || JSON.stringify(d.error))));
      const rawText = d.content?.map(b => b.text || "").join("") || "";
      if (!rawText) throw new Error("Empty response from API. Raw: " + raw.slice(0, 200));
      let card = null;
      try {
        const cleaned = rawText.trim().replace(/^```json\s*|^```\s*|```\s*$/g, "");
        card = JSON.parse(cleaned);
      } catch { card = null; }
      if (!card) {
        const cutOff = d.stop_reason === "max_tokens" ? " (looks like it got cut off mid-JSON, hit the token cap)" : "";
        setMsgs(prev => [...prev, { role: "assistant", content: "⚠ Retrospective read didn't come back as valid JSON" + cutOff + ". Raw response: " + rawText.slice(0, 300) }]);
      } else {
        card.stage = localStage;
        // Repackage as a normal CARD_START/CARD_END message so it renders
        // through the exact same Bubble/Card pipeline as every live turn —
        // the gate box and two-panel display derive state from the merged
        // counts identically, whether the instances came from a live turn
        // or a backfill.
        const display = `Retrospective read, backfilled from the last ${windowed.length} real exchanges.\nCARD_START${JSON.stringify(card)}CARD_END`;
        setMsgs(prev => [...prev, { role: "assistant", content: display, ts: Date.now() }]);
        onCaseFileUpdate(prospect.id, card);
      }
    } catch (err) {
      setMsgs(prev => [...prev, { role: "assistant", content: "⚠ Retrospective read failed: " + (err.message || "unknown error") }]);
    }
    setRetroLoading(false);
  }

  async function runAnalysis(newMsgs) {
    // Fold any messages that are about to fall outside the window into the
    // running summary before they disappear from context entirely.
    let caseFile = prospect.caseFile || {};
    const summarizedThrough = caseFile.summarizedThrough || 0;
    const aboutToFallOut = newMsgs.length - HISTORY_CAP;
    if (aboutToFallOut > summarizedThrough) {
      const agingMsgs = newMsgs.slice(summarizedThrough, aboutToFallOut);
      if (agingMsgs.length > 0) {
        const updatedSummary = await summarizeAging(prospect.name, caseFile.summary, agingMsgs);
        caseFile = { ...caseFile, summary: updatedSummary, summarizedThrough: aboutToFallOut };
        onSummaryUpdate(prospect.id, updatedSummary, aboutToFallOut);
      }
    }

    // Real exchange count — counts only actual turns between Kwasi and her
    // ([HER] and [I SENT THIS] tagged messages), never the assistant's own
    // coaching replies or Kwasi's private [MY THOUGHTS] notes. Computed here
    // in code so the model never has to (re-)count the raw transcript itself.
    const realExchangeCount = newMsgs.filter(m =>
      m.role === "user" && (m.content.startsWith("[HER]") || m.content.startsWith("[I SENT THIS]"))
    ).length;

    const ctx = `PROSPECT: ${prospect.name}, age ${prospect.age||"?"}, ${prospect.platform||"unknown"}, current stage ${localStage}\nOverview: ${prospect.overview||"none"}\nNotes: ${prospect.notes||"none"}\nReal exchange count so far: ${realExchangeCount}\n---\n\n${caseFileSummary(caseFile)}`;
    // Cap what actually goes to the API — keep the most recent ~60 messages so
    // long-running threads don't grow the request (and cost) without bound.
    // Full history still lives in localStorage/msgs regardless, and anything
    // older is preserved in the running summary above instead of just dropped.
    const windowed = newMsgs.length > HISTORY_CAP ? newMsgs.slice(-HISTORY_CAP) : newMsgs;
    // Strip every historical assistant turn down to its plain reasoning text —
    // none of the messages in `windowed` at this point are the live turn
    // (the model hasn't replied yet), so it's always safe to strip all of them.
    const apiMsgs = windowed.map((m, i) => {
      let content = m.role === "assistant" ? stripCardForHistory(m.content) : m.content;
      if (i === 0) content = ctx + content;
      return { role: m.role, content };
    });

    try {
      const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: MAIN_MODEL, system: SYSTEM, messages: apiMsgs }) });
      const raw = await res.text();
      let d;
      try { d = JSON.parse(raw); } catch { throw new Error("Server returned non-JSON (HTTP " + res.status + "). This usually means api/chat.js is crashing. First 200 chars: " + raw.slice(0, 200)); }
      if (d.error) throw new Error("API error: " + (typeof d.error === "string" ? d.error : (d.error.message || JSON.stringify(d.error))));
      const text = d.content?.map(b => b.text || "").join("") || d.result || "";
      if (d.stop_reason === "max_tokens") {
        throw new Error("Response got cut off mid-answer (hit the max_tokens cap in api/chat.js). Raise max_tokens there and try again — nothing was lost, just resend.");
      }
      if (!text) throw new Error("Empty response from API. Raw: " + raw.slice(0, 200));
      const usage = d.usage || null;
      const cost = costFor(MAIN_MODEL, usage);
      setMsgs(prev => [...prev, { role: "assistant", content: text, usage, cost, ts: Date.now() }]);
      // Fire stage update immediately when card detected
      const { card } = parseMsg(text);
      if (card && card.stage) { setLocalStage(card.stage); onStageUpdate(prospect.id, card.stage); }
      if (card && (card.disqualifier_alert || card.markers_confirmed?.length || card.markers_contradicted?.length || card.her_markers?.length || card.his_markers?.length || card.reported_unverified?.length)) {
        onCaseFileUpdate(prospect.id, card);
      }
    } catch (err) {
      setMsgs(prev => [...prev, { role: "assistant", content: "⚠ " + (err && err.message ? err.message : "Something went wrong. Try again.") }]);
    }
    setLoading(false);
  }

  const starters = [
    prospect.name + " just messaged me — what should I say?",
    "This is where I'm at with " + prospect.name + " — give me a read",
    "I think I'm at " + localStage + " with " + prospect.name + " — does that sound right?",
    "I'm stuck with " + prospect.name + " — she's gone a bit cold",
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#0a0a0c" }}>
      <div style={{ padding: "12px 16px", borderBottom: "1px solid #141416", display: "flex", alignItems: "center", gap: "11px", background: "#0a0a0c", flexShrink: 0, zIndex: 10 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: "20px", lineHeight: 1 }}>←</button>
        <div style={{ width: "36px", height: "36px", borderRadius: "50%", background: sc(localStage) + "22", border: "2px solid " + sc(localStage) + "55", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "15px", fontWeight: "700", color: sc(localStage), flexShrink: 0 }}>{prospect.name[0].toUpperCase()}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: "700", fontSize: "14px" }}>{prospect.name}</div>
          <div style={{ fontSize: "11px", color: "#444" }}>{[prospect.age, prospect.platform].filter(Boolean).join(" · ")}</div>
          {(() => {
            const cf = prospect.caseFile || {};
            const isHardcore = localStage.startsWith("C");
            // Same deriveMarkerState the gate box and two-panel display use —
            // never a stored .state field — so this header stat can never
            // show a different number than what's underneath it in the card.
            const herConfirmed = HER_MARKERS.filter(n => deriveMarkerState(cf.herMarkers?.[n]?.confirmCount, cf.herMarkers?.[n]?.contradictCount).state === "confirmed").length;
            const hisConfirmed = HIS_MARKERS.filter(n => deriveMarkerState(cf.hisMarkers?.[n]?.confirmCount, cf.hisMarkers?.[n]?.contradictCount).state === "confirmed").length;
            const hardcoreTotal = herConfirmed + hisConfirmed;
            const bits = [];
            if (isHardcore && hardcoreTotal) bits.push(hardcoreTotal + "/" + HARDCORE_TOTAL + " hardcore markers");
            else if (!isHardcore && cf.markersConfirmed?.length) bits.push(cf.markersConfirmed.length + " markers remembered");
            if (cf.disqualifiers?.length) bits.push("⚠ " + cf.disqualifiers.length + " disqualifier flag" + (cf.disqualifiers.length > 1 ? "s" : ""));
            if (!bits.length) return null;
            return <div style={{ fontSize: "9px", color: cf.disqualifiers?.length ? "#C0392B" : "#4a8a4a", marginTop: "2px" }}>{bits.join(" · ")}</div>;
          })()}
        </div>
        <div style={{ background: sc(localStage), borderRadius: "4px", padding: "3px 8px", fontSize: "10px", fontWeight: "700", color: "#fff" }}>{localStage}</div>
        {msgs.length > 0 && <button onClick={() => { if(confirm("Clear history for " + prospect.name + "?")) { setMsgs([]); localStorage.removeItem("chat-" + prospect.id); }}} style={{ background: "none", border: "1px solid #1e1e22", borderRadius: "4px", padding: "3px 8px", color: "#444", fontSize: "10px", cursor: "pointer" }}>Clear</button>}
      </div>
      {localStage.startsWith("C") && !Object.keys(prospect.caseFile?.herMarkers || {}).length && !Object.keys(prospect.caseFile?.hisMarkers || {}).length && (
        <div style={{ padding: "10px 16px", borderBottom: "1px solid #141416", background: "#0a1220", flexShrink: 0, display: "flex", alignItems: "center", gap: "10px", flexWrap: "wrap" }}>
          <div style={{ fontSize: "11px", color: "#7ab0d8", flex: 1, minWidth: "180px" }}>This real history predates the hardcore blueprint — nothing's been read against the 22 yet.</div>
          <button onClick={runRetrospective} disabled={retroLoading} style={{ background: "#2a5a8a", border: "none", borderRadius: "6px", padding: "6px 12px", color: "#fff", fontSize: "11px", fontWeight: "600", cursor: retroLoading ? "not-allowed" : "pointer" }}>{retroLoading ? "Reading..." : "Run retrospective read"}</button>
        </div>
      )}
      {threadCost > 0 && (
        <div style={{ padding: "4px 16px", fontSize: "10px", color: "#3a3a3a", borderBottom: "1px solid #141416", flexShrink: 0 }}>
          Thread cost so far: ${threadCost.toFixed(2)}
        </div>
      )}

      <div className="chat-scroll" style={{ flex: 1, overflowY: "auto", padding: "16px 16px 8px" }}>
        {msgs.length === 0 ? (
          <div style={{ paddingTop: "16px" }}>
            <div style={{ fontSize: "13px", color: "#444", lineHeight: "1.7", marginBottom: "18px" }}>Tell me what's going on with {prospect.name}. Drop in wherever you are.</div>
            {starters.map((s, i) => <button key={i} onClick={() => send(s, "thoughts")} style={{ background: "#141416", border: "1px solid #1e1e22", borderRadius: "8px", padding: "10px 13px", color: "#666", fontSize: "12px", cursor: "pointer", textAlign: "left", lineHeight: "1.5", display: "block", width: "100%", marginBottom: "7px" }}>"{s}"</button>)}
          </div>
        ) : msgs.map((m, i) => <Bubble key={i} msg={m} name={prospect.name} onSent={sentReply} caseFile={prospect.caseFile} />)}
        {loading && <div style={{ marginBottom: "16px" }}><div style={{ fontSize: "9px", color: "#333", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "6px" }}>The Filter</div><div style={{ fontSize: "13px", color: "#444", fontStyle: "italic" }}>Reading the situation...</div></div>}
        <div ref={bottomRef} />
      </div>

      <div style={{ padding: "10px 12px", borderTop: "1px solid #141416", flexShrink: 0, background: "#0a0a0c" }}>
        <div style={{ display: "flex", gap: "6px", marginBottom: "8px" }}>
          {[["her","Her"],["kwasi","I sent this"],["thoughts","💭 My thoughts"]].map(([m, label]) => (
