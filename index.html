<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Filter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #1a1a1a;
  --surface3: #222;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-dim: #8a6f2e;
  --red: #c0392b;
  --red-dim: #7a2020;
  --green: #2ecc71;
  --green-dim: #1a6b3a;
  --text: #e8e8e8;
  --text-dim: #888;
  --text-faint: #444;
  --mono: 'Space Mono', monospace;
  --sans: 'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

/* ROOT LAYOUT */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.12em;
  white-space: nowrap;
}

.prospect-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex: 1;
  padding: 2px 0;
  -webkit-overflow-scrolling: touch;
}

.prospect-strip::-webkit-scrollbar { display: none; }

.strip-item {
  flex-shrink: 0;
  padding: 6px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  min-width: 90px;
  text-align: center;
}

.strip-item.active { border-color: var(--gold-dim); background: var(--surface3); }

.strip-name {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  display: block;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80px;
}

.strip-tag {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
}

.btn-new {
  flex-shrink: 0;
  background: var(--gold);
  color: #000;
  border: none;
  padding: 7px 12px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

/* PROSPECT HEADER */
.prospect-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.prospect-name {
  font-family: var(--mono);
  font-size: 17px;
  font-style: italic;
  color: var(--text);
}

.prospect-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.btn-remove {
  background: none;
  border: 1px solid var(--red-dim);
  color: var(--red);
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 9px;
  cursor: pointer;
  flex-shrink: 0;
}

/* TABS */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 10px 6px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
  text-align: center;
}

.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* MAIN BODY — fills remaining height */
.main-body {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* SCROLLABLE CONTENT */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px;
  min-height: 0;
}

/* PINNED INPUT BAR */
.input-bar {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.msg-textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px;
  resize: none;
  height: 62px;
  outline: none;
  line-height: 1.5;
  -webkit-appearance: none;
}

.msg-textarea:focus { border-color: var(--gold-dim); }

.mic-btn {
  flex-shrink: 0;
  width: 46px;
  height: 62px;
  background: var(--gold);
  border: none;
  color: #000;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mic-btn.listening { background: var(--red); color: #fff; animation: pulse 1s infinite; }

.btn-submit {
  width: 100%;
  padding: 11px;
  background: var(--gold);
  color: #000;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
}

.btn-submit:disabled { background: var(--surface3); color: var(--text-faint); cursor: not-allowed; }

/* EMPTY STATE */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-faint);
  font-family: var(--mono);
  font-size: 11px;
  gap: 10px;
  text-align: center;
  padding: 40px 20px;
}

.empty-icon { font-size: 40px; opacity: 0.2; }
.empty-title { font-size: 14px; color: var(--text-dim); }

/* CARDS */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 13px;
  margin-bottom: 10px;
}

.card-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.card-text {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.7;
}

.card-strategy {
  font-size: 12px;
  color: var(--gold);
  font-style: italic;
  line-height: 1.6;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* REPLY CARDS */
.reply-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 13px;
  margin-bottom: 8px;
  cursor: pointer;
}

.reply-card:active { border-color: var(--gold); }

.reply-num {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-faint);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.reply-num span { color: var(--gold); }

.reply-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 8px;
}

.reply-why {
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.5;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* FLAG */
.flag-box {
  background: rgba(192,57,43,0.1);
  border: 1px solid var(--red-dim);
  padding: 12px 13px;
  margin-bottom: 10px;
}

.flag-title {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--red);
  letter-spacing: 0.12em;
  margin-bottom: 6px;
}

.flag-text { font-size: 12px; color: var(--red); line-height: 1.6; }

/* STAGE RECOMMEND */
.stage-rec {
  background: rgba(201,168,76,0.08);
  border-left: 2px solid var(--gold);
  padding: 10px 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

.stage-rec-text { font-size: 12px; color: var(--gold); line-height: 1.5; }

.btn-confirm {
  flex-shrink: 0;
  background: var(--gold);
  color: #000;
  border: none;
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  cursor: pointer;
}

/* CHECKIN */
.checkin-box {
  background: rgba(201,168,76,0.06);
  border: 1px solid var(--gold-dim);
  padding: 13px;
  margin-bottom: 10px;
}

.checkin-q {
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 10px;
  line-height: 1.5;
}

.checkin-opts { display: flex; flex-wrap: wrap; gap: 6px; }

.btn-opt {
  padding: 6px 12px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
}

/* VERDICT SUMMARY */
.verdict-box {
  background: var(--surface2);
  border-left: 3px solid var(--gold);
  padding: 13px;
  margin-bottom: 10px;
}

.verdict-box-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.verdict-box-text { font-size: 12px; color: var(--text-dim); line-height: 1.7; }

/* HISTORY */
.history-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 10px 12px;
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
}

.history-who { font-family: var(--mono); font-size: 9px; color: var(--text-faint); margin-bottom: 3px; }

/* PROFILE TAB */
.section { margin-bottom: 22px; }

.section-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.verdict-btns { display: flex; gap: 6px; }

.verdict-btn {
  flex: 1;
  padding: 10px 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  cursor: pointer;
  text-align: center;
}

.verdict-btn.vb-proceed { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.verdict-btn.vb-pending { background: var(--surface3); border-color: var(--gold); color: var(--gold); }
.verdict-btn.vb-walkaway { background: var(--red-dim); border-color: var(--red); color: var(--red); }

.stage-list { display: flex; flex-direction: column; gap: 4px; }

.stage-item {
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid transparent;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: center;
}

.stage-item.s-active { background: var(--surface3); border-color: var(--gold-dim); color: var(--gold); }
.stage-item.s-done { color: var(--text-dim); }
.stage-code { font-size: 10px; color: var(--text-faint); }
.stage-item.s-active .stage-code { color: var(--gold-dim); }

.score-display {
  text-align: center;
  padding: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.score-number { font-family: var(--mono); font-size: 38px; color: var(--gold); line-height: 1; }
.score-bar { height: 2px; background: var(--surface3); margin: 8px auto; max-width: 100px; }
.score-bar-fill { height: 100%; background: var(--red); transition: width 0.4s; }
.score-sublabel { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; }

.score-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.score-row-info { flex: 1; }
.score-row-label { font-size: 12px; color: var(--text-dim); }
.score-row-weight { font-size: 10px; color: var(--text-faint); }

.score-slider {
  width: 70px;
  -webkit-appearance: none;
  height: 2px;
  background: var(--surface3);
  outline: none;
  flex-shrink: 0;
}

.score-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--gold);
  cursor: pointer;
  border-radius: 0;
}

.score-val {
  font-family: var(--mono);
  font-size: 12px;
  width: 20px;
  text-align: right;
  color: var(--text);
  flex-shrink: 0;
}

.dq-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-bottom: 4px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.dq-item.dq-on { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.dq-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--text-faint); flex-shrink: 0; }
.dq-item.dq-on .dq-dot { background: var(--red); border-color: var(--red); }

.bs-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-bottom: 4px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.bs-item.bs-on { background: rgba(201,168,76,0.08); border-color: var(--gold-dim); color: var(--gold); }
.bs-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--text-faint); flex-shrink: 0; }
.bs-item.bs-on .bs-dot { background: var(--gold); border-color: var(--gold); }

.notes-area {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 11px;
  resize: vertical;
  min-height: 90px;
  outline: none;
  line-height: 1.6;
}

.notes-area:focus { border-color: var(--gold-dim); }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 20px;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 22px;
  width: 100%;
  max-width: 380px;
}

.modal-title {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.field { margin-bottom: 12px; }

.field-label {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 5px;
  text-transform: uppercase;
}

.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 9px 11px;
  outline: none;
  -webkit-appearance: none;
}

.field-input:focus { border-color: var(--gold-dim); }

.modal-btns { display: flex; gap: 8px; margin-top: 18px; }

.btn-primary {
  flex: 1;
  padding: 10px;
  background: var(--gold);
  color: #000;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}

.btn-secondary {
  flex: 1;
  padding: 10px;
  background: none;
  color: var(--text-dim);
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
}

.btn-dismiss {
  margin-top: 8px;
  padding: 5px 10px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
}

/* LOADING */
.loading {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 0;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px;
}

.dots span { animation: blink 1.2s infinite; font-size: 20px; color: var(--gold); }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.mode-btn {
  flex: 1;
  padding: 7px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  cursor: pointer;
  text-transform: uppercase;
}
.mode-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
  font-weight: 700;
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────
const STAGES = [
  {code:'A1',label:'Initial Contact'},
  {code:'A2',label:'Demonstrating Value'},
  {code:'A3',label:'Qualifying Her'},
  {code:'C1',label:'Early Rapport'},
  {code:'C2',label:'Deeper Connection'},
  {code:'C3',label:'Full Clarity'},
];

const SCORE_FIELDS = [
  {key:'emotionalStability',   label:'Emotional Stability',   w:20},
  {key:'loyaltyHonesty',       label:'Loyalty & Honesty',     w:20},
  {key:'maternalWarmth',       label:'Maternal Warmth',       w:15},
  {key:'valuesAlignment',      label:'Values Alignment',      w:15},
  {key:'financialCharacter',   label:'Financial Character',   w:10},
  {key:'communication',        label:'Communication',         w:10},
  {key:'naturalPresentation',  label:'Natural Presentation',  w:5},
  {key:'peacefulPresence',     label:'Peaceful Presence',     w:5},
];

const DISQUALIFIERS = [
  'Has children already','Smokes','Excessive profanity',
  'No accountability / always the victim','Emotional volatility',
  'Financial irresponsibility','Early dishonesty / story changes',
  'Flirting with others in your presence','Swore at you directly',
  'Projecting unresolved trauma','Hidden agenda / managing you',
  'Hot/cold inconsistency',
];

const BLIND_SPOTS = [
  '⚠ Fixer pattern active',
  '⚠ Making exception to own rules',
  '⚠ Measuring against Tia',
  '⚠ Cold exit impulse',
];

function emptyScores(){ const s={}; SCORE_FIELDS.forEach(f=>s[f.key]=0); return s; }
function calcScore(p){
  if(!p.scores) return 0;
  let t=0; SCORE_FIELDS.forEach(f=>{ t+=(p.scores[f.key]||0)*(f.w/100); });
  return Math.round(t*10);
}

function load(){ try{ return JSON.parse(localStorage.getItem('filter_v3')||'null'); }catch{return null;} }
function save(){ localStorage.setItem('filter_v3', JSON.stringify(state)); }

let state = load() || { prospects:[], activeId:null };
function getP(){ return state.prospects.find(p=>p.id===state.activeId)||null; }

// ── VOICE ─────────────────────────────────
let recog=null, recogTarget=null;

function setupMic(inputId, btnId){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  const btn=document.getElementById(btnId);
  const inp=document.getElementById(inputId);
  if(!btn||!inp) return;
  btn.onclick=()=>{
    if(recog && recogTarget===inputId){ recog.stop(); return; }
    if(recog) recog.stop();
    recog=new SR(); recog.continuous=true; recog.interimResults=true; recog.lang='en-GB';
    recogTarget=inputId;
    btn.classList.add('listening');
    let base=inp.value;
    recog.onresult=e=>{
      let fin='',int='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) fin+=e.results[i][0].transcript;
        else int+=e.results[i][0].transcript;
      }
      if(fin) base+=fin+' ';
      inp.value=base+int;
    };
    recog.onend=()=>{ btn.classList.remove('listening'); recog=null; recogTarget=null; };
    recog.start();
  };
}

// ── API ───────────────────────────────────
async function ai(system, messages){
  const r=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system,messages})
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||'API error');
  return d.content[0].text;
}

// ── RENDER ────────────────────────────────
function render(){
  const root=document.getElementById('app');
  const p=getP();

  let html=`
    <div class="topbar">
      <div class="logo">THE FILTER</div>
      <div class="prospect-strip" id="pstrip">
        ${state.prospects.map(pr=>`
          <div class="strip-item ${pr.id===state.activeId?'active':''}" data-pid="${pr.id}">
            <span class="strip-name">${pr.name}</span>

  if(!p){

        <div class="empty">
          <div class="empty-icon">◎</div>
          <div class="empty-title">The Filter</div>
          <div>Add a prospect to begin</div>

        </div>
      </div>
    `;
  } else {
    const tab=p._tab||'copilot';
    html+=`
      <div class="prospect-header">
        <div>
          <div class="prospect-name">${p.name}</div>
          <div class="prospect-meta">${p.platform} · Age ${p.age}</div>
        </div>
        <button class="btn-remove" id="btn-remove">Remove</button>
      </div>
      <div class="tabs">
        <button class="tab ${tab==='copilot'?'active':''}" data-tab="copilot">Co-Pilot</button>
        <button class="tab ${tab==='profile'?'active':''}" data-tab="profile">Profile & Score</button>
        <button class="tab ${tab==='debrief'?'active':''}" data-tab="debrief">Debrief</button>

        ${tab==='debrief' ? renderDebrief(p) : ''}
      </div>
    `;
  }

  root.innerHTML=html;
  bindEvents();
}

// ── EVENTS ────────────────────────────────
function bindEvents(){
  document.getElementById('btn-new')?.addEventListener('click', showModal);

  document.querySelectorAll('.strip-item[data-pid]').forEach(el=>{
    el.addEventListener('click',()=>{ state.activeId=el.dataset.pid; save(); render(); });
  });

  document.getElementById('btn-remove')?.addEventListener('click',()=>{
    if(!confirm('Remove this prospect?')) return;
    state.prospects=state.prospects.filter(p=>p.id!==state.activeId);
    state.activeId=state.prospects[0]?.id||null;
    save(); render();
  });

  document.querySelectorAll('.tab[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>{
      const p=getP(); if(!p) return;
      p._tab=el.dataset.tab; save(); render();
    });
  });

  document.querySelectorAll('[data-v]').forEach(el=>{
    el.addEventListener('click',()=>{
      const p=getP(); if(!p) return;
      p.verdict=el.dataset.v; save(); render();
    });
  });

  document.querySelectorAll('.stage-item[data-stage]').forEach(el=>{
    el.addEventListener('click',()=>{
      const p=getP(); if(!p) return;
      p.stage=el.dataset.stage; save(); render();
    });
  });

  document.getElementById('btn-confirm-stage')?.addEventListener('click',(e)=>{
    const p=getP(); if(!p) return;
    p.stage=e.target.dataset.stage; p.stageRec=null; save(); render();
  });

  document.querySelectorAll('.score-slider[data-sk]').forEach(el=>{
    el.addEventListener('input',()=>{
      const p=getP(); if(!p) return;
      if(!p.scores) p.scores=emptyScores();
      p.scores[el.dataset.sk]=parseInt(el.value);
      const v=document.getElementById('sv-'+el.dataset.sk);
      if(v) v.textContent=el.value;
      const sn=document.querySelector('.score-number');
      if(sn) sn.textContent=calcScore(p);
      save();
    });
  });

  document.querySelectorAll('.dq-item[data-dq]').forEach(el=>{
    el.addEventListener('click',()=>{
      const p=getP(); if(!p) return;
      if(!p.flaggedDQs) p.flaggedDQs=[];
      const dq=el.dataset.dq;
      p.flaggedDQs=p.flaggedDQs.includes(dq)?p.flaggedDQs.filter(x=>x!==dq):[...p.flaggedDQs,dq];
      save(); render();
    });
  });

  document.querySelectorAll('.bs-item[data-bs]').forEach(el=>{
    el.addEventListener('click',()=>{
      const p=getP(); if(!p) return;
      if(!p.activeBS) p.activeBS=[];
      const bs=el.dataset.bs;
      p.activeBS=p.activeBS.includes(bs)?p.activeBS.filter(x=>x!==bs):[...p.activeBS,bs];
      save(); render();
    });
  });

  document.getElementById('notes-area')?.addEventListener('blur',(e)=>{
    const p=getP(); if(!p) return;
    p.notes=e.target.value; save();
  });

  document.getElementById('dismiss-flag')?.addEventListener('click',()=>{
    const p=getP(); if(!p) return; p.pendingFlag=null; save(); render();
  });
  document.getElementById('dismiss-stalling')?.addEventListener('click',()=>{
    const p=getP(); if(!p) return; p.stallingExit=null; p.stalling=false; save(); render();
  });
  document.getElementById('dismiss-verdict')?.addEventListener('click',()=>{
    const p=getP(); if(!p) return; p.verdictRec=null; save(); render();
  });

  document.querySelectorAll('.btn-opt[data-ci]').forEach(el=>{
    el.addEventListener('click',()=>{
      const p=getP(); if(!p) return;
      const ci=p.pendingCheckin; if(!ci) return;
      p.pendingCheckin=null;
      handleCheckin(p, ci, ci.options[parseInt(el.dataset.ci)]);
    });
  });

  document.getElementById('btn-analyse')?.addEventListener('click', doAnalyse);

  // Mode buttons
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const inp=document.getElementById('msg-input');
      if(inp){
        inp.placeholder = btn.dataset.mode==='her_message'
          ? 'Paste her message here...'
          : 'Tell me what's going on...';
      }
    });
  });
  document.getElementById('btn-debrief')?.addEventListener('click', doDebrief);

  setupMic('msg-input','mic-msg');
  setupMic('debrief-input','mic-debrief');
}

// ── ANALYSE ───────────────────────────────
async function doAnalyse(){
  const p=getP(); if(!p) return;
  const inp=document.getElementById('msg-input');
  const msg=inp?.value?.trim(); if(!msg) return;
  const out=document.getElementById('analysis-out');
  // Get selected mode from buttons
  const activeBtn=document.querySelector('.mode-btn.active');
  const selectedMode=activeBtn?.dataset?.mode||'context';
  out.innerHTML=`<div class="loading"><div class="dots"><span>.</span><span>.</span><span>.</span></div>&nbsp;Reading...</div>`;

  const stageInfo=STAGES.find(s=>s.code===(p.stage||'A1'));
  // Recent prospect message history for context
  const hist=(p.history||[]).slice(-10).map(h=>`[${h.dir==='in'?'HER':'YOU'}]: ${h.text}`).join('\n');
  // Full co-pilot conversation memory — persisted across sessions
  const copilotMemory = (p.copilotMemory||[]);

  const sys=`You are The Filter — a grounded, honest co-pilot for Kwasi. He is dating with serious intent: marriage and family within 5 years. INTJ. Expresses love through acts of service. Emotionally guarded but deeply loyal. Targets ESFJ-type partners.

His blind spots: fixer tendency (stays too long with volatile or dishonest women), makes exceptions to his own rules, measures new women against ex Tia, cold exit impulse when uncomfortable.

Prospect: ${p.name}, ${p.platform}, Age ${p.age}
Stage: ${stageInfo?.code} — ${stageInfo?.label}
Score so far: ${calcScore(p)}/100
Exchange count: ${(p.history||[]).length}
Flagged disqualifiers: ${(p.flaggedDQs||[]).join(', ')||'None'}
Known patterns this prospect: ${p.knownPatterns||'None yet'}
Recent history:
${hist||'None yet.'}

Kwasi has told you what mode this is: ${selectedMode === 'her_message' ? 'HER MESSAGE — he is pasting something she sent him and wants reply options' : 'CONTEXT — he is talking to you, giving you information about the situation'}.

${selectedMode === 'her_message' ? 
'→ Give a brief situational read. Suggest 3 replies in his voice. Be specific about stage-appropriate strategy. Set mode to her_message.' : 
'→ Do NOT suggest replies. Give your honest read. Ask 1-2 follow-up questions to build your picture. Update scores silently. Only flag patterns seen MORE THAN ONCE. Set mode to context.'}

REPLY VOICE RULES — critical:
- Dry and plain. Short sentences. Never clever for the sake of it.
- Never smooth, never try-hard, never performative warmth.
- A1/A2: measured, slightly detached, makes her work.
- C1/C2: warmer but still grounded, never gushing.
- C3: open and direct.
- Good example: "You went quiet — everything good?" Bad example: "I noticed some inconsistency in your communication patterns recently."
- Good example: "Depends who's asking." Bad example: "That's an interesting question, I'd say I'm somewhere in between."

STRATEGIC NEXT MOVE — only include when something genuinely needs addressing:
- Conversation going on too long without moving to date/number
- Pattern forming that needs a probe
- Momentum stalling
- She's earned a stage move

PATTERN FLAGS — only trigger after seeing same behaviour TWICE. First occurrence: file silently in knownPatterns. Second occurrence: flag it with a specific low-key probe suggestion in Kwasi's voice.

Always update scores silently from context. Never ask him to score manually.

Respond ONLY in valid JSON, no extra text:
{
  "mode": "context" or "her_message" or "unclear",
  "read": "honest 2-3 sentence read, plain language",
  "followUpQuestions": null or ["q1", "q2"],
  "strategicMove": null or "one sentence — what needs to happen next and why",
  "stageRecommend": null or {"stage":"C1","message":"plain reason"},
  "flagPattern": null or "what the pattern is + one dry probe suggestion in his voice",
  "blindSpotAlert": null or "specific relevant blind spot, plain language",
  "stallingAlert": null or "plain exit strategy",
  "verdictReady": null or "straight verdict summary",
  "scoreUpdates": null or {"emotionalStability":7},
  "newPatterns": null or "comma separated patterns to file for monitoring",
  "replies": null or [
    {"text":"reply in his voice","why":"plain explanation of why"},
    {"text":"reply in his voice","why":"plain explanation of why"},
    {"text":"reply in his voice","why":"plain explanation of why"}
  ]
}`;

  try {
    const raw=await ai(sys,[...copilotMemory,{role:'user',content:msg}]);
    const result=JSON.parse(raw.replace(/```json|```/g,'').trim());

    if(!p.history) p.history=[];
    p.history.push({dir:'in',text:msg,ts:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});

    // Save to co-pilot memory so context persists across sessions
    if(!p.copilotMemory) p.copilotMemory=[];
    p.copilotMemory.push({role:'user',content:msg});
    p.copilotMemory.push({role:'assistant',content:raw});
    // Keep last 20 exchanges to avoid token bloat
    if(p.copilotMemory.length>40) p.copilotMemory=p.copilotMemory.slice(-40);

    // Track score changes for display
    const scoreChanges=[];
    if(result.scoreUpdates && p.scores){
      Object.keys(result.scoreUpdates).forEach(k=>{
        if(p.scores.hasOwnProperty(k)){
          const old=p.scores[k];
          const nw=result.scoreUpdates[k];
          if(nw!==old) scoreChanges.push({key:k,old,new:nw});
          p.scores[k]=nw;
        }
      });
    }

    // Store new patterns for monitoring
    if(result.newPatterns){
      p.knownPatterns = p.knownPatterns
        ? p.knownPatterns + ', ' + result.newPatterns
        : result.newPatterns;
    }

    if(result.stageRecommend) p.stageRec=result.stageRecommend;
    if(result.flagPattern) p.pendingFlag=result.flagPattern;
    if(result.stallingAlert){ p.stallingExit=result.stallingAlert; p.stalling=true; }
    if(result.verdictReady) p.verdictRec=result.verdictReady;
    save();

    // Score change indicator
    const scoreHtml = scoreChanges.length>0 ? `
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;font-family:var(--mono);color:var(--text-faint);">
        ${scoreChanges.map(c=>{
          const diff=c.new-c.old;
          const col=diff>0?'var(--green)':'var(--red)';
          const label=SCORE_FIELDS.find(f=>f.key===c.key)?.label||c.key;
          return `<span style="margin-right:10px;color:${col}">${label} ${diff>0?'↑':'↓'}${Math.abs(diff)}</span>`;
        }).join('')}
      </div>` : '';

    // Build output based on mode
    let html=`
      <div class="card">
        <div class="card-label">${result.mode==='unclear' ? 'Clarification Needed' : result.mode==='context' ? 'My Read' : 'Situational Read'}</div>
        <div class="card-text">${result.read}</div>
        ${result.blindSpotAlert?`<div style="margin-top:8px;font-size:12px;color:var(--red);line-height:1.5;">⚠ ${result.blindSpotAlert}</div>`:''}
        ${scoreHtml}
      </div>
    `;

    // Strategic next move — only when present
    if(result.strategicMove){
      html+=`<div style="background:rgba(201,168,76,0.06);border-left:2px solid var(--gold);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--gold);line-height:1.5;">→ ${result.strategicMove}</div>`;
    }

    // Follow-up questions for context mode
    if(result.followUpQuestions && result.followUpQuestions.length>0){
      html+=`<div class="checkin-box">
        <div class="checkin-q" style="color:var(--text-dim);font-size:12px;margin-bottom:10px;">To build a better picture:</div>
        ${result.followUpQuestions.map((q,i)=>`<div style="font-size:13px;color:var(--gold);margin-bottom:8px;line-height:1.5;">${i+1}. ${q}</div>`).join('')}
      </div>`;
    }

    // Reply suggestions for her_message mode
    if(result.replies && result.replies.length>0){
      html+=result.replies.map((r,i)=>`
        <div class="reply-card" data-reply="${encodeURIComponent(r.text)}">
          <div class="reply-num">OPTION ${i+1} <span>tap to use</span></div>
          <div class="reply-text">${r.text}</div>
          <div class="reply-why">${r.why}</div>
        </div>
      `).join('');
    }

    out.innerHTML=html;

    document.querySelectorAll('.reply-card[data-reply]').forEach(el=>{
      el.addEventListener('click',()=>{
        const text=decodeURIComponent(el.dataset.reply);
        if(!p.history) p.history=[];
        p.history.push({dir:'out',text,ts:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
        save(); inp.value='';
        el.style.borderColor='var(--gold)';
        setTimeout(()=>render(),600);
      });
    });

    // Scroll to top of output
    document.getElementById('copilot-scroll')?.scrollTo({top:0,behavior:'smooth'});

  } catch(err){
    out.innerHTML=`<div class="card"><div class="card-text" style="color:var(--red)">Error: ${err.message}</div></div>`;
  }
}

// ── DEBRIEF ───────────────────────────────

  const text=inp?.value?.trim(); if(!text) return;

Current stage: ${p.stage||'A1'}, Score: ${calcScore(p)}/100

Extract insights from what he shares. Update scores and flag patterns based on what he describes.

Respond ONLY in this JSON:
{
  "summary": "2-3 sentence honest summary of what this means",
  "updates": [{"label":"what changed and why"}],
  "scoreUpdates": null or {"fieldKey": value},
  "stageAdvance": null or {"stage":"C1","message":"reason"},
  "flagPattern": null or "flag",
  "blindSpotAlert": null or "note"
}`;

  try {
    const raw=await ai(sys,[{role:'user',content:text}]);

    if(result.flagPattern) p.pendingFlag=result.flagPattern;
    if(!p.debriefs) p.debriefs=[];

    // Save debrief to co-pilot memory too

    save();

    out.innerHTML=`
      <div class="card">
        <div class="card-label">Debrief Summary</div>
        <div class="card-text">${result.summary}</div>
        ${result.blindSpotAlert?`<div style="margin-top:8px;font-size:12px;color:var(--red);">⚠ ${result.blindSpotAlert}</div>`:''}
      </div>
      ${(result.updates||[]).map(u=>`
        <div style="display:flex;gap:8px;align-items:flex-start;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;font-size:12px;color:var(--text-dim);line-height:1.5;">
          <span style="color:var(--gold);font-family:var(--mono);">→</span>${u.label}
        </div>
      `).join('')}
    `;
    inp.value='';
  } catch(err){
    out.innerHTML=`<div class="card"><div class="card-text" style="color:var(--red)">Error: ${err.message}</div></div>`;
  }
}

// ── CHECKIN ───────────────────────────────
async function handleCheckin(p, ci, answer){
  try {
    const raw=await ai(
      `You are The Filter. Kwasi answered a check-in about ${p.name}. Q: "${ci.question}" A: "${answer}". Suggest score updates if warranted. JSON only: {"note":"1 sentence","scoreUpdates":null or {"field":value},"flagPattern":null or "flag"}`,
      [{role:'user',content:answer}]
    );
    const result=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(result.scoreUpdates && p.scores){
      Object.keys(result.scoreUpdates).forEach(k=>{ if(p.scores.hasOwnProperty(k)) p.scores[k]=result.scoreUpdates[k]; });
    }
    if(result.flagPattern) p.pendingFlag=result.flagPattern;
  } catch(e){}
  save(); render();
}

// ── MODAL ─────────────────────────────────
function showModal(){
  const ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`
    <div class="modal">
      <div class="modal-title">New Prospect</div>
      <div class="field"><label class="field-label">Name</label><input class="field-input" id="f-name" placeholder="First name"></div>
      <div class="field"><label class="field-label">Platform</label><input class="field-input" id="f-platform" placeholder="Hinge, Happn, Other..."></div>
      <div class="field"><label class="field-label">Age</label><input class="field-input" id="f-age" type="number" placeholder="Age"></div>
      <div class="field"><label class="field-label">First impression (optional)</label><input class="field-input" id="f-notes" placeholder="She seems..."></div>
      <div class="modal-btns">
        <button class="btn-secondary" id="m-cancel">Cancel</button>
        <button class="btn-primary" id="m-confirm">Add</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
  document.getElementById('m-cancel').onclick=()=>ov.remove();
  document.getElementById('m-confirm').onclick=()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name) return;
    const np={
      id:Date.now().toString(), name,
      platform:document.getElementById('f-platform').value.trim()||'Unknown',
      age:document.getElementById('f-age').value.trim()||'?',
      notes:document.getElementById('f-notes').value.trim(),
      verdict:'pending', stage:'A1',
      scores:emptyScores(), flaggedDQs:[], activeBS:[],
      history:[], debriefs:[], _tab:'copilot',
    };
    state.prospects.push(np);
    state.activeId=np.id;
    save(); ov.remove(); render();
  };
}

// ── INIT ──────────────────────────────────
render();
</script>
