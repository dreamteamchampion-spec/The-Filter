class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Render crash:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ position: "fixed", inset: 0, background: "#0a0a0c", color: "#e8e6e1", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px", textAlign: "center", gap: "14px" }}>
          <div style={{ fontSize: "15px", fontWeight: "700" }}>Something crashed</div>
          <div style={{ fontSize: "12px", color: "#888", maxWidth: "320px", lineHeight: "1.6" }}>{this.state.error.message || String(this.state.error)}</div>
          <button onClick={() => { this.setState({ error: null }); window.location.reload(); }} style={{ background: "#C0392B", border: "none", borderRadius: "8px", padding: "10px 18px", color: "#fff", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// Matches free-text marker phrasing (which may carry a "(msg N)" suffix or
// slightly different wording turn to turn) back to one of the 10 canonical
// MARKERS. Same substring heuristic MarkerGrid already uses for display, now
// also used to dedupe on write so re-confirming the same trait twice doesn't
// create two separate entries.
function canonicalMarker(raw) {
  const t = asText(raw).toLowerCase();
  const hit = MARKERS.find(m => t.includes(m.toLowerCase().slice(0, 8)));
  return hit || asText(raw); // fall back to raw text if it doesn't match a known marker
}

function mergeCaseFile(existing, card) {
  const cf = {
    disqualifiers: [...(existing.disqualifiers || [])],
    markersConfirmed: [...(existing.markersConfirmed || [])],
    markersContradicted: [...(existing.markersContradicted || [])],
    // IOIs/flags persist here across the whole thread — fixes the bug where
    // they'd thin out or vanish once older messages aged out of the API
    // context window, since previously the model was the only thing holding
    // this list and had no way to recall what had already scrolled away.
    iois: [...(existing.iois || [])],
    iods: [...(existing.iods || [])],
    reportedUnverified: Array.from(new Set([...(existing.reportedUnverified || []), ...((card.reported_unverified || []).map(asText))])),
    contradictionAlerts: [...(existing.contradictionAlerts || [])],
  };
  if (card.disqualifier_alert && card.disqualifier_alert !== "null") {
    const t = asText(card.disqualifier_alert);
    if (t && !cf.disqualifiers.includes(t)) cf.disqualifiers.push(t);
  }
  (card.markers_confirmed || []).forEach(m => {
    const t = canonicalMarker(m);
    if (t && !cf.markersConfirmed.includes(t)) cf.markersConfirmed.push(t);
  });
  (card.markers_contradicted || []).forEach(m => {
    const t = canonicalMarker(m);
    if (t && !cf.markersContradicted.includes(t)) cf.markersContradicted.push(t);
  });
  (card.iois || []).forEach(x => { const t = asText(x); if (t && !cf.iois.includes(t)) cf.iois.push(t); });
  (card.iods || []).forEach(x => { const t = asText(x); if (t && !cf.iods.includes(t)) cf.iods.push(t); });
  // Hardcore marker merge happens last, against the disqualifier/iois-updated
  // cf so mergeHardcoreSignals can detect a contradiction landing against a
  // marker that was ALREADY confirmed before this turn's signals — that's
  // the "contradiction tracking against prior confirmations" requirement,
  // surfaced as a visible alert rather than a silent state change.
  const herResult = mergeHardcoreSignals(existing.herMarkers, card.her_markers, HER_MARKERS);
  const hisResult = mergeHardcoreSignals(existing.hisMarkers, card.his_markers, HIS_MARKERS);
  cf.herMarkers = herResult.markers;
  cf.hisMarkers = hisResult.markers;
  cf.contradictionAlerts.push(...herResult.newAlerts, ...hisResult.newAlerts);
  return cf;
}

// Accumulates hardcore blueprint her/his_markers SIGNALS (confirm/contradict
// instances, never a state) into the persisted count object per marker. This
// is the only place instance counts are written — the model never writes a
// count or a state directly, only ever "this instance confirms/contradicts
// X", so the persisted number can't drift from what was actually reported.
// Also detects and surfaces the specific case Kwasi flagged: a contradicting
// instance landing against a marker that was CONFIRMED before this signal —
// that's worth a visible alert, not just a quiet count change.
function mergeHardcoreSignals(existing, signals, canonicalList) {
  const acc = { ...(existing || {}) };
  const newAlerts = [];
  (signals || []).forEach(m => {
    if (!m?.name || (m.signal !== "confirm" && m.signal !== "contradict")) return;
    const nm = canonicalHardcoreMarker(m.name, canonicalList);
    const prev = acc[nm] || { confirmCount: 0, contradictCount: 0, reasons: [] };
    const wasConfirmed = deriveMarkerState(prev.confirmCount, prev.contradictCount).state === "confirmed";
    if (wasConfirmed && m.signal === "contradict") {
      newAlerts.push(`${nm}: previously confirmed (${prev.confirmCount} confirming instances), now contradicted — ${asText(m.reason)}`);
    }
    acc[nm] = {
      confirmCount: prev.confirmCount + (m.signal === "confirm" ? 1 : 0),
      contradictCount: prev.contradictCount + (m.signal === "contradict" ? 1 : 0),
      // Keep only the 3 most recent reasons per marker — enough context for
      // the model and the UI without the case file growing unbounded over
      // a long-running thread with dozens of instances per marker.
      reasons: [...(prev.reasons || []), asText(m.reason)].filter(Boolean).slice(-3),
    };
  });
  return { markers: acc, newAlerts };
}

function caseFileSummary(caseFile) {
  if (!caseFile) return "";
  const cf = caseFile;
  const lines = [];
  if (cf.disqualifiers && cf.disqualifiers.length) lines.push("Disqualifiers flagged so far: " + cf.disqualifiers.join(" | "));
  if (cf.markersConfirmed && cf.markersConfirmed.length) lines.push("Blueprint markers confirmed to date: " + cf.markersConfirmed.join(" | "));
  if (cf.markersContradicted && cf.markersContradicted.length) lines.push("Blueprint markers contradicted to date: " + cf.markersContradicted.join(" | "));

  // Hardcore blueprint state, told to the model as DERIVED fact (never as
  // something it should recompute or recount) — this is what keeps its
  // prose consistent with the real gate box even before a turn's own
  // her_markers/his_markers deltas are added on top.
  const herLines = HER_MARKERS.map(n => {
    const e = cf.herMarkers?.[n];
    if (!e) return null;
    const d = deriveMarkerState(e.confirmCount, e.contradictCount);
    if (d.state === "no data") return null;
    return `${n}: ${d.state} (${d.detail})`;
  }).filter(Boolean);
  const hisLines = HIS_MARKERS.map(n => {
    const e = cf.hisMarkers?.[n];
    if (!e) return null;
    const d = deriveMarkerState(e.confirmCount, e.contradictCount);
    if (d.state === "no data") return null;
    return `${n}: ${d.state} (${d.detail})`;
  }).filter(Boolean);
  if (herLines.length) lines.push("Hardcore blueprint — HER markers with any evidence so far (state is CODE-DERIVED from instance counts, do not restate as a different state, do not state the totals in your reasoning):\n" + herLines.join("\n"));
  if (hisLines.length) lines.push("Hardcore blueprint — HIS markers with any evidence so far:\n" + hisLines.join("\n"));
  if (cf.reportedUnverified && cf.reportedUnverified.length) lines.push("Reported but unverified so far (still needs independent later corroboration): " + cf.reportedUnverified.join(" | "));
  if (cf.iois && cf.iois.length) lines.push("IOIs logged to date (do not repeat these, only report genuinely new ones): " + cf.iois.join(" | "));
  if (cf.iods && cf.iods.length) lines.push("Flags logged to date (do not repeat these, only report genuinely new ones): " + cf.iods.join(" | "));
  if (cf.contradictionAlerts && cf.contradictionAlerts.length) lines.push("Contradiction alerts (a marker previously confirmed that later got contradicted): " + cf.contradictionAlerts.join(" | "));

  let out = "";
  if (lines.length) out += "PERMANENT CASE FILE (accumulated across the whole history, do not contradict or forget this even though older messages are out of view):\n" + lines.join("\n") + "\n";
  if (cf.summary) out += "\nRUNNING SUMMARY OF EARLIER CONVERSATION (messages this covers are no longer in the raw context below):\n" + cf.summary + "\n";
  if (out) out += "---\n\n";
  return out;
}

const MAIN_MODEL = "claude-sonnet-5";
const SUMMARY_MODEL = "claude-haiku-4-5-20251001";
const HISTORY_CAP = 60;

// $ per million tokens. Sonnet 5 intro pricing runs through Aug 31 2026,
// then input/output move to $3/$15 — update the sonnet row after that date.
// Check current rates at https://docs.claude.com/en/docs/about-claude/pricing
const PRICING = {
  "claude-sonnet-5": { in: 2, out: 10 },
  "claude-haiku-4-5-20251001": { in: 1, out: 5 },
};

function costFor(model, usage) {
  if (!usage) return null;
  const p = PRICING[model] || PRICING["claude-sonnet-5"];
  const inTok = usage.input_tokens || 0;
  const outTok = usage.output_tokens || 0;
  // Cache reads bill at ~10% of normal input price; cache writes at ~1.25x.
  // Included so the number reflects real cost if prompt caching ever gets added.
  const cacheRead = usage.cache_read_input_tokens || 0;
  const cacheWrite = usage.cache_creation_input_tokens || 0;
  return (inTok / 1e6) * p.in + (outTok / 1e6) * p.out + (cacheRead / 1e6) * p.in * 0.1 + (cacheWrite / 1e6) * p.in * 1.25;
}

// Condenses messages that are about to fall out of the API context window into
// a running narrative, using the cheap model. This is pure compression, not
// judgment, so Haiku is the right tool here even though it's not used for coaching.
async function summarizeAging(prospectName, priorSummary, agingMsgs) {
  const transcript = agingMsgs.map(m => {
    if (m.role === "user") return m.content;
    const { text } = parseMsg(m.content);
    return "[THE FILTER]: " + text;
  }).join("\n");
  const sys = "You condense dating-app coaching chat history into a short running narrative. You will be given the existing summary (may be empty) and a chunk of older messages about to be dropped from context. Merge them into an updated summary under 200 words: key facts " + prospectName + " has shared (job, family, values, timeline, red or green flags), what Kwasi has actually sent her, and anything unresolved. Plain prose, no headers, no JSON, third person. Output ONLY the updated summary text.";
  const userContent = "EXISTING SUMMARY:\n" + (priorSummary || "(none yet)") + "\n\nOLDER MESSAGES TO FOLD IN:\n" + transcript;
  try {
    const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: SUMMARY_MODEL, system: sys, messages: [{ role: "user", content: userContent }] }) });
    const d = await res.json();
    const text = d.content?.map(b => b.text || "").join("") || "";
    return text.trim() || priorSummary || "";
  } catch (e) {
    console.error("summarization failed, keeping prior summary:", e);
    return priorSummary || "";
  }
}

function App() {
  const [prospects, setProspects] = useState(() => { try { return JSON.parse(localStorage.getItem("tf-prospects") || "[]"); } catch { return []; } });
  const [selected, setSelected] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [repairResult, setRepairResult] = useState(null);

  useEffect(() => {
    try { localStorage.setItem("tf-prospects", JSON.stringify(prospects)); }
    catch (e) { console.error("prospects storage write failed:", e); }
  }, [prospects]);

  // Read the freshest persisted caseFile for one prospect directly off disk,
  // bypassing this session's in-memory state entirely. Used as a safety net
  // when writing caseFile updates: if this tab/session has been open a while
  // (or another tab/reload pushed the same prospect further in the meantime),
  // React state here can be stale. Always reconciling against disk first means
  // a stale session can add to the case file but never silently erase markers
  // that were confirmed elsewhere since this session last synced.
  function freshestCaseFile(id, fallback) {
    try {
      const onDisk = JSON.parse(localStorage.getItem("tf-prospects") || "[]");
      const match = onDisk.find(p => p.id === id);
      return (match && match.caseFile) || fallback || {};
    } catch { return fallback || {}; }
  }

  function addProspect(p) { setProspects(ps => [...ps, p]); setSelected(p.id); setShowNew(false); }
  function updateStage(id, stage) { setProspects(ps => ps.map(p => p.id === id ? { ...p, stage } : p)); }
  // Reconciles two hardcore-marker count objects by taking the MAX of each
  // count per marker (never the sum — these are two views of the same
  // underlying history, not two separate sets of new instances, so adding
  // them would double-count). Safe: can only recover a higher count that
  // existed on disk, never invents or loses one.
  function reconcileHardcoreMarkers(a, b) {
    const out = { ...(a || {}) };
    Object.keys(b || {}).forEach(name => {
      const x = out[name] || { confirmCount: 0, contradictCount: 0, reasons: [] };
      const y = b[name] || {};
      out[name] = {
        confirmCount: Math.max(x.confirmCount || 0, y.confirmCount || 0),
        contradictCount: Math.max(x.contradictCount || 0, y.contradictCount || 0),
        reasons: Array.from(new Set([...(x.reasons || []), ...(y.reasons || [])])).slice(-3),
      };
    });
    return out;
  }

  function updateCaseFile(id, card) {
    setProspects(ps => ps.map(p => {
      if (p.id !== id) return p;
      // Merge onto whichever caseFile is more complete: this session's memory,
      // or whatever's newest on disk (in case another session moved it further
      // since this one last loaded). mergeCaseFile is additive/deduped for the
      // array fields, so merging the disk version in first is always safe —
      // it can only add. Hardcore marker counts reconcile separately by max.
      const disk = freshestCaseFile(id, p.caseFile);
      const reconciled = mergeCaseFile(p.caseFile || {}, { markers_confirmed: disk.markersConfirmed, markers_contradicted: disk.markersContradicted, disqualifier_alert: null });
      reconciled.herMarkers = reconcileHardcoreMarkers(reconciled.herMarkers, disk.herMarkers);
      reconciled.hisMarkers = reconcileHardcoreMarkers(reconciled.hisMarkers, disk.hisMarkers);
      reconciled.reportedUnverified = Array.from(new Set([...(reconciled.reportedUnverified || []), ...(disk.reportedUnverified || [])]));
      reconciled.iois = Array.from(new Set([...(reconciled.iois || []), ...(disk.iois || [])]));
      reconciled.iods = Array.from(new Set([...(reconciled.iods || []), ...(disk.iods || [])]));
      reconciled.contradictionAlerts = Array.from(new Set([...(reconciled.contradictionAlerts || []), ...(disk.contradictionAlerts || [])]));
      return { ...p, caseFile: mergeCaseFile(reconciled, card) };
    }));
  }
  function updateSummary(id, summary, summarizedThrough) { setProspects(ps => ps.map(p => p.id === id ? { ...p, caseFile: { ...(p.caseFile || {}), summary, summarizedThrough } } : p)); }
  function removeProspect(id) { if(confirm("Remove this prospect?")) { setProspects(ps => ps.filter(p => p.id !== id)); localStorage.removeItem("chat-" + id); } }

  const cp = prospects.find(p => p.id === selected);

  if (cp) return <Chat prospect={cp} onBack={() => setSelected(null)} onStageUpdate={updateStage} onCaseFileUpdate={updateCaseFile} onSummaryUpdate={updateSummary} />;

  // Rebuilds a prospect's marker/disqualifier set from scratch by walking
  // every assistant message in their full chat history and re-running the
  // same canonicalize+merge logic mergeCaseFile already uses live. The raw
  // card data for every past turn is still sitting in localStorage regardless
  // of what happened to the separately-tracked caseFile, so this recovers
  // anything that got dropped by the stale-tab overwrite bug.
  function rebuildCaseFileFromHistory(prospectId) {
    let chat = [];
    try { chat = JSON.parse(localStorage.getItem("chat-" + prospectId) || "[]"); } catch {}
    let rebuilt = { disqualifiers: [], markersConfirmed: [], markersContradicted: [], herMarkers: {}, hisMarkers: {}, reportedUnverified: [], iois: [], iods: [], contradictionAlerts: [] };
    chat.forEach(m => {
      if (m.role !== "assistant") return;
      const { card } = parseMsg(m.content);
      if (card) rebuilt = mergeCaseFile(rebuilt, card);
    });
    return rebuilt;
  }

  // Additive-only repair: unions the rebuilt-from-history set with whatever's
  // currently saved, for every prospect. Never removes anything already
  // present, so worst case for any given prospect is a no-op. Hardcore marker
  // counts reconcile by max (via reconcileHardcoreMarkers), same principle.
  function repairAllMarkerData() {
    const results = [];
    setProspects(ps => ps.map(p => {
      const rebuilt = rebuildCaseFileFromHistory(p.id);
      const existing = p.caseFile || {};
      const mergedHer = reconcileHardcoreMarkers(existing.herMarkers, rebuilt.herMarkers);
      const mergedHis = reconcileHardcoreMarkers(existing.hisMarkers, rebuilt.hisMarkers);
      const merged = {
        ...existing,
        disqualifiers: Array.from(new Set([...(existing.disqualifiers || []), ...rebuilt.disqualifiers])),
        markersConfirmed: Array.from(new Set([...(existing.markersConfirmed || []), ...rebuilt.markersConfirmed])),
        markersContradicted: Array.from(new Set([...(existing.markersContradicted || []), ...rebuilt.markersContradicted])),
        herMarkers: mergedHer,
        hisMarkers: mergedHis,
        reportedUnverified: Array.from(new Set([...(existing.reportedUnverified || []), ...rebuilt.reportedUnverified])),
        iois: Array.from(new Set([...(existing.iois || []), ...rebuilt.iois])),
        iods: Array.from(new Set([...(existing.iods || []), ...rebuilt.iods])),
        contradictionAlerts: Array.from(new Set([...(existing.contradictionAlerts || []), ...rebuilt.contradictionAlerts])),
      };
      const beforeHardcore = HER_MARKERS.filter(n => deriveMarkerState(existing.herMarkers?.[n]?.confirmCount, existing.herMarkers?.[n]?.contradictCount).state === "confirmed").length
        + HIS_MARKERS.filter(n => deriveMarkerState(existing.hisMarkers?.[n]?.confirmCount, existing.hisMarkers?.[n]?.contradictCount).state === "confirmed").length;
      const afterHardcore = HER_MARKERS.filter(n => deriveMarkerState(mergedHer?.[n]?.confirmCount, mergedHer?.[n]?.contradictCount).state === "confirmed").length
        + HIS_MARKERS.filter(n => deriveMarkerState(mergedHis?.[n]?.confirmCount, mergedHis?.[n]?.contradictCount).state === "confirmed").length;
      const before = (existing.markersConfirmed || []).length + beforeHardcore;
      const after = merged.markersConfirmed.length + afterHardcore;
      results.push({ name: p.name, before, after });
      return { ...p, caseFile: merged };
    }));
    setRepairResult(results);
  }

  function exportAllData() {
    const data = {
      exportedAt: new Date().toISOString(),
      prospects: prospects.map(p => {
        let chat = [];
        try { chat = JSON.parse(localStorage.getItem("chat-" + p.id) || "[]"); } catch {}
        return { ...p, chat };
      }),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "the-filter-export-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, display: "flex", flexDirection: "column", background: "#0a0a0c" }}>
      <div style={{ padding: "16px", borderBottom: "1px solid #141416", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, background: "#0a0a0c", zIndex: 10 }}>
        <div>
          <div style={{ fontSize: "10px", color: "#444", letterSpacing: "0.1em", textTransform: "uppercase" }}>⚡ The Filter</div>
          <div style={{ fontSize: "18px", fontWeight: "700", marginTop: "2px" }}>Prospects</div>
        </div>
        <div style={{ display: "flex", gap: "8px" }}>
          {prospects.length > 0 && <button onClick={exportAllData} style={{ background: "none", border: "1px solid #222", borderRadius: "8px", padding: "8px 14px", color: "#888", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Export</button>}
          {prospects.length > 0 && <button onClick={repairAllMarkerData} style={{ background: "none", border: "1px solid #222", borderRadius: "8px", padding: "8px 14px", color: "#888", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>Repair markers</button>}
          <button onClick={() => setShowNew(true)} style={{ background: "#C0392B", border: "none", borderRadius: "8px", padding: "8px 16px", color: "#fff", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>+ Add</button>
        </div>
      </div>

      <div style={{ padding: "16px", flex: 1, overflowY: "auto" }}>
        {repairResult && (
          <div style={{ background: "#0d1a0d", border: "1px solid #1a3a1a", borderRadius: "10px", padding: "12px 14px", marginBottom: "14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
              <div style={{ fontSize: "11px", color: "#7ab87a", fontWeight: "700", letterSpacing: "0.05em", textTransform: "uppercase" }}>Marker repair complete</div>
              <button onClick={() => setRepairResult(null)} style={{ background: "none", border: "none", color: "#4a8a4a", cursor: "pointer", fontSize: "16px" }}>✕</button>
            </div>
            {repairResult.filter(r => r.after !== r.before).length === 0 ? (
              <div style={{ fontSize: "12px", color: "#7ab87a" }}>Nothing needed fixing — every prospect's markers already matched their chat history.</div>
            ) : repairResult.map((r, i) => r.after !== r.before ? (
              <div key={i} style={{ fontSize: "12px", color: "#aad8aa", lineHeight: "1.8" }}>{r.name}: {r.before} → {r.after} markers restored</div>
            ) : null)}
          </div>
        )}
        {prospects.length === 0 ? (
          <div style={{ textAlign: "center", paddingTop: "80px", color: "#333" }}>
            <div style={{ fontSize: "48px", marginBottom: "16px" }}>👤</div>
            <div style={{ fontSize: "15px", color: "#555", marginBottom: "6px" }}>No prospects yet</div>
            <div style={{ fontSize: "12px", color: "#333" }}>Add one to start</div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
            {prospects.map(p => {
              const color = sc(p.stage);
              const chatLen = (() => { try { return JSON.parse(localStorage.getItem("chat-" + p.id) || "[]").length; } catch { return 0; } })();
              return (
                <div key={p.id} style={{ background: "#111113", border: "1px solid #1a1a1d", borderRadius: "12px", padding: "14px 16px", display: "flex", alignItems: "center", gap: "12px" }}>
                  <button onClick={() => setSelected(p.id)} style={{ display: "flex", alignItems: "center", gap: "12px", flex: 1, background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ width: "44px", height: "44px", borderRadius: "50%", background: color + "22", border: "2px solid " + color + "55", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px", fontWeight: "700", color, flexShrink: 0 }}>{p.name[0].toUpperCase()}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: "600", fontSize: "15px", color: "#e8e6e1" }}>{p.name}</div>
                      <div style={{ fontSize: "11px", color: "#444", marginTop: "2px" }}>{[p.age, p.platform].filter(Boolean).join(" · ")}{chatLen > 0 ? " · " + Math.floor(chatLen/2) + " exchanges" : ""}</div>
                    </div>
                    <div style={{ background: color, borderRadius: "4px", padding: "3px 8px", fontSize: "10px", fontWeight: "700", color: "#fff" }}>{p.stage||"A1"}</div>
                  </button>
                  <button onClick={() => removeProspect(p.id)} style={{ background: "none", border: "none", color: "#333", cursor: "pointer", fontSize: "16px", padding: "4px" }}>✕</button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {showNew && <NewSheet onSave={addProspect} onClose={() => setShowNew(false)} />}
    </div>
  );
}

ReactDOM.render(React.createElement(ErrorBoundary, null, React.createElement(App)), document.getElementById('root'));
</script>
</body>
</html>
