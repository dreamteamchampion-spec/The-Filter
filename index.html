<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Filter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0f; color: #e8e6e1; font-family: 'Inter', system-ui, sans-serif; }
    textarea, input, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; } 
    ::-webkit-scrollbar-track { background: #0d0d0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const STAGES = [
      { id: "A1", label: "A1 — Approach", color: "#C0392B", description: "Initial contact. Disarm the shield, generate curiosity.", via_text: "Just matched / first message sent. She's passive or neutral.", iois: ["Replies quickly", "Asks a question back", "Uses humour or personality", "Sends longer messages than yours"], next: "Get 2+ IOIs. Then shift to showing value — don't chase." },
      { id: "A2", label: "A2 — Demonstrate Value", color: "#E67E22", description: "Show who you are without selling yourself. She should be chasing the thread.", via_text: "She's engaging but still evaluating you.", iois: ["Asks about your life", "Reacts strongly to stories", "Sends longer messages", "Initiates a topic"], next: "She's chasing the thread. Now qualify her — make her earn it." },
      { id: "A3", label: "A3 — Qualify Her", color: "#F1C40F", description: "Flip the frame. Make her prove she's worth your time.", via_text: "She's clearly interested. Now make her prove she's interesting to you.", iois: ["Tries to impress you", "Opens up personally", "Seeks your approval", "Responds to your standards with enthusiasm"], next: "She's qualified. Transition to comfort — now it's about connection." },
      { id: "C1", label: "C1 — Comfort (Early)", color: "#27AE60", description: "She likes you — now she needs to trust you. Build genuine connection.", via_text: "Real conversation starting. Get the number here if not done.", iois: ["Shares personal stories", "Asks about your past / future", "Texts first", "Sends voice notes or photos voluntarily"], next: "Number secured. Bridge to a Day 2." },
      { id: "C2", label: "C2 — Comfort (Deepening)", color: "#2980B9", description: "Deepen comfort across time. She's invested — keep the thread alive.", via_text: "She's invested. You've met or are actively planning to.", iois: ["Makes plans with you", "Talks about the future casually", "References inside jokes", "Reaches out for no particular reason"], next: "She's emotionally connected. One more layer then you're in S territory." },
      { id: "C3", label: "C3 — Comfort (Your World)", color: "#8E44AD", description: "She's in or near your world. Physical escalation is natural.", via_text: "She's talking about coming over or you're already physically intimate.", iois: ["Agrees to private meetups", "Flirty / suggestive language", "Comfortable with physical talk", "Asks about your place"], next: "You're ready for S1. Take over in person — the text work is done." },
    ];

    function buildAnalysisPrompt(p) {
      return `You are The Filter — Kwasi's sharp, no-nonsense dating co-pilot trained on the Mystery Method and The Game by Neil Strauss. You are helping Kwasi with a specific woman named ${p.name}. Use her name naturally throughout.

PROSPECT: Name: ${p.name}, Age: ${p.age||"unknown"}, Platform: ${p.platform||"unknown"}, Stage: ${p.stage||"A1"}
Overview: ${p.overview||"none"}, Notes: ${p.notes||"none"}

MM STAGES (goal: get to C3 via text so in-person starts at S1):
- A1: Penetrate shield. No compliments/supplication. Opinion openers, false time constraints, light negs. Need 2+ IOIs.
- A2: DHV — pre-selection, non-neediness, storytelling, frame control, dancing string. Track buying temperature and hook point.
- A3: Qualify her. Flip frame. "Beauty is common — what do you have inside?" Reward specifically what she reveals.
- C1: Comfort. Real questions, chick crack, elicit values, time distortion. Get number. Bridge to Day 2.
- C2: Sustained comfort. Reference shared threads. Don't over-text.
- C3: Near your world. False time constraint. Watch for ASD — hold frame.

KWASI'S BLIND SPOTS: fixer tendency / exception-making on disqualifiers (children, smoking, volatility, dishonesty) / early verdict / cold exit / Tia benchmark

KWASI'S VOICE: Dry deadpan. Warm only when earned. Direct. Doesn't chase. Never "haha"/"lol". Never double-texts.

OUTPUT — JSON ONLY, NO FENCES, NO PREAMBLE:
{"detected_stage":"A1","stage_reasoning":"precise sentence citing specific signals","hook_point_reached":false,"buying_temperature":"low","iois_detected":["specific IOI"],"iods_detected":["specific flag"],"what_he_needs_to_do":"MM tactic now + checkpoint to advance","watch_for":"one blind spot","replies":[{"label":"Dry / Hold frame","text":"..."},{"label":"Warm / Forward","text":"..."},{"label":"Qualify / Flip","text":"..."}]}`;
    }

    function buildCoachPrompt(p) {
      return `You are The Filter — Kwasi's sharp, honest dating co-pilot trained on the Mystery Method and The Game by Neil Strauss.

You are helping Kwasi with ${p.name}. Always use her name — never anonymous she/her.

ABOUT ${p.name.toUpperCase()}: Age: ${p.age||"unknown"}, Platform: ${p.platform||"unknown"}, Stage: ${p.stage||"A1"}
Overview: ${p.overview||"none"}, Notes: ${p.notes||"none"}

Your job: 1) Name what's actually happening with ${p.name} honestly 2) Place Kwasi in MM framework and explain plainly 3) Tell him what to do next with ${p.name} using MM tactics 4) Flag blind spots if relevant: fixer tendency, exception-making, early verdict, cold exit, Tia benchmark 5) End asking: paste conversation for replies, or work through what to say on a call?

TONE: Sharp, direct, warm when it matters. Trusted friend. Not a therapist.
FORMAT — bold headers **like this**, flowing prose.`;
    }

    const EMPTY = { id: "", name: "", age: "", platform: "", stage: "A1", overview: "", notes: "" };

    function renderMD(text) {
      return text.split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
        p.startsWith("**") && p.endsWith("**")
          ? React.createElement('strong', { key: i, style: { color: "#e8e6e1", display: "block", marginTop: i > 0 ? "12px" : 0, marginBottom: "2px" } }, p.slice(2,-2))
          : React.createElement('span', { key: i }, p)
      );
    }

    function App() {
      const [prospects, setProspects] = useState(() => {
        try { return JSON.parse(localStorage.getItem("filter-prospects") || "[]"); } catch { return []; }
      });
      const [selected, setSelected] = useState(null);
      const [view, setView] = useState("list");
      const [editP, setEditP] = useState({...EMPTY});
      const [tab, setTab] = useState("input");
      const [convo, setConvo] = useState("");
      const [situ, setSitu] = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [chat, setChat] = useState([]);
      const [chatIn, setChatIn] = useState("");
      const bottomRef = useRef(null);
      const resRef = useRef(null);

      const cp = prospects.find(p => p.id === selected) || null;
      const csData = result ? STAGES.find(s => s.id === result.detected_stage) : null;
      const sc = (id) => STAGES.find(s => s.id === id)?.color || "#444";

      useEffect(() => {
        try { localStorage.setItem("filter-prospects", JSON.stringify(prospects)); } catch {}
      }, [prospects]);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chat, loading]);

      async function api(systemPrompt, messages) {
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ system: systemPrompt, messages }),
        });
        const d = await r.json();
        return d.content?.map(b => b.text || "").join("") || d.result || "";
      }

      function saveP() {
        if (!editP.name.trim()) return;
        if (editP.id) {
          setProspects(ps => ps.map(p => p.id === editP.id ? editP : p));
        } else {
          const n = { ...editP, id: Date.now().toString() };
          setProspects(ps => [...ps, n]);
          setSelected(n.id);
        }
        setView("profile");
      }

      function delP(id) { setProspects(ps => ps.filter(p => p.id !== id)); setSelected(null); setView("list"); }
      function updStage(id, stage) { setProspects(ps => ps.map(p => p.id === id ? { ...p, stage } : p)); }

      async function runAnalysis() {
        if (!convo.trim() || !cp) { setError("Paste her messages first."); return; }
        setError(""); setLoading(true); setResult(null);
        try {
          const t = await api(buildAnalysisPrompt(cp), [{ role: "user", content: `YOUR TAKE: ${situ||"not provided"}\n\nCONVERSATION:\n${convo}\n\nJSON only.` }]);
          const parsed = JSON.parse(t.replace(/```json|```/g, "").trim());
          setResult(parsed);
          if (parsed.detected_stage) updStage(cp.id, parsed.detected_stage);
          setTab("result");
          setTimeout(() => resRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
        } catch { setError("Analysis failed. Try again."); }
        finally { setLoading(false); }
      }

      async function sendChat(ov) {
        if (!cp) return;
        const msg = (ov !== undefined ? ov : chatIn).trim();
        if (!msg) return;
        const h = [...chat, { role: "user", content: msg }];
        setChat(h); setChatIn(""); setLoading(true);
        try {
          const t = await api(buildCoachPrompt(cp), h);
          setChat([...h, { role: "assistant", content: t }]);
        } catch { setChat([...h, { role: "assistant", content: "Something went wrong. Try again." }]); }
        finally { setLoading(false); }
      }

      const C = { background: "#141416", border: "1px solid #1e1e22", borderRadius: "8px" };
      const I = { background: "#141416", border: "1px solid #222", borderRadius: "6px", padding: "8px 10px", color: "#e8e6e1", fontSize: "13px", outline: "none", width: "100%", boxSizing: "border-box" };
      const L = { fontSize: "10px", color: "#555", letterSpacing: "0.08em", textTransform: "uppercase", display: "block", marginBottom: "5px" };

      function Pipe({ as, si2 }) {
        return (
          <div style={{ padding: "9px 16px", borderBottom: "1px solid #1a1a1d", overflowX: "auto" }}>
            <div style={{ display: "flex", gap: "3px", minWidth: "min-content", alignItems: "center" }}>
              {STAGES.map((s, i) => {
                const ia = as === s.id, ip = si2 > i;
                return (
                  <div key={s.id} style={{ display: "flex", alignItems: "center", gap: "3px" }}>
                    <div style={{ padding: "3px 6px", borderRadius: "3px", fontSize: "10px", fontWeight: "700", background: ia ? s.color : ip ? "#1a2a1a" : "#141416", color: ia ? "#fff" : ip ? "#4a8a4a" : "#444", border: `1px solid ${ia ? s.color : ip ? "#2a4a2a" : "#222"}` }}>{s.id}</div>
                    {i < 5 && <div style={{ fontSize: "8px", color: "#2a2a2e" }}>→</div>}
                  </div>
                );
              })}
              <div style={{ display: "flex", alignItems: "center", gap: "3px" }}>
                <div style={{ fontSize: "8px", color: "#2a2a2e" }}>→</div>
                <div style={{ padding: "3px 6px", borderRadius: "3px", fontSize: "10px", fontWeight: "700", background: "#141416", color: "#444", border: "1px solid #222" }}>S1+</div>
              </div>
            </div>
          </div>
        );
      }

      function Hdr({ title, onBack, action }) {
        return (
          <div style={{ borderBottom: "1px solid #1e1e22", padding: "13px 16px", display: "flex", alignItems: "center", gap: "10px", position: "sticky", top: 0, background: "#0d0d0f", zIndex: 10 }}>
            {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: "20px", padding: "0", lineHeight: 1 }}>←</button>}
            <div style={{ fontWeight: "700", fontSize: "14px", flex: 1 }}>{title}</div>
            {action}
          </div>
        );
      }

      // LIST
      if (view === "list") return (
        <div style={{ minHeight: "100vh" }}>
          <Hdr title="⚡ The Filter" action={
            <button onClick={() => { setEditP({...EMPTY}); setView("new"); }} style={{ background: "#C0392B", border: "none", borderRadius: "5px", padding: "6px 14px", color: "#fff", fontSize: "13px", fontWeight: "600", cursor: "pointer" }}>+ Add</button>
          } />
          <div style={{ maxWidth: "500px", margin: "0 auto", padding: "16px" }}>
            {prospects.length === 0 ? (
              <div style={{ textAlign: "center", padding: "80px 0", color: "#444" }}>
                <div style={{ fontSize: "48px", marginBottom: "16px" }}>👤</div>
                <div style={{ fontSize: "15px", color: "#666", marginBottom: "6px" }}>No prospects yet</div>
                <div style={{ fontSize: "13px" }}>Tap + Add to create your first profile</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {prospects.map(p => (
                  <button key={p.id} onClick={() => { setSelected(p.id); setView("profile"); }} style={{ ...C, padding: "14px 16px", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: "12px", width: "100%" }}>
                    <div style={{ width: "44px", height: "44px", borderRadius: "50%", background: sc(p.stage)+"22", border: `2px solid ${sc(p.stage)}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px", fontWeight: "700", color: sc(p.stage), flexShrink: 0 }}>
                      {p.name.charAt(0).toUpperCase()}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: "600", fontSize: "15px", color: "#e8e6e1", marginBottom: "3px" }}>{p.name}</div>
                      <div style={{ fontSize: "12px", color: "#555" }}>{[p.age, p.platform].filter(Boolean).join(" · ")}</div>
                    </div>
                    <div style={{ background: sc(p.stage), borderRadius: "4px", padding: "3px 8px", fontSize: "11px", fontWeight: "700", color: "#fff" }}>{p.stage || "A1"}</div>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );

      // NEW / EDIT
      if (view === "new" || view === "edit") return (
        <div style={{ minHeight: "100vh" }}>
          <Hdr title={view === "edit" ? `Edit ${editP.name}` : "New Prospect"} onBack={() => setView(selected ? "profile" : "list")} />
          <div style={{ maxWidth: "500px", margin: "0 auto", padding: "16px", display: "flex", flexDirection: "column", gap: "14px" }}>
            <div><span style={L}>Name *</span><input placeholder="Her name" value={editP.name} onChange={e => setEditP(p => ({...p, name: e.target.value}))} style={I} /></div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <div><span style={L}>Age</span><input placeholder="Age" value={editP.age} onChange={e => setEditP(p => ({...p, age: e.target.value}))} style={I} /></div>
              <div><span style={L}>Platform</span><input placeholder="Happn, Hinge…" value={editP.platform} onChange={e => setEditP(p => ({...p, platform: e.target.value}))} style={I} /></div>
            </div>
            <div>
              <span style={L}>Current Stage</span>
              <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                {STAGES.map(s => (
                  <button key={s.id} onClick={() => setEditP(p => ({...p, stage: s.id}))} style={{ padding: "5px 10px", borderRadius: "4px", fontSize: "12px", fontWeight: "600", cursor: "pointer", border: `1px solid ${editP.stage === s.id ? s.color : "#222"}`, background: editP.stage === s.id ? s.color : "#141416", color: editP.stage === s.id ? "#fff" : "#555" }}>{s.id}</button>
                ))}
              </div>
            </div>
            <div><span style={L}>Overview</span><textarea placeholder="How you met, her personality, vibe, anything relevant…" value={editP.overview} onChange={e => setEditP(p => ({...p, overview: e.target.value}))} rows={3} style={{...I, resize: "vertical", lineHeight: "1.5"}} /></div>
            <div><span style={L}>Notes</span><textarea placeholder="Red flags, what's happened so far, things to remember…" value={editP.notes} onChange={e => setEditP(p => ({...p, notes: e.target.value}))} rows={3} style={{...I, resize: "vertical", lineHeight: "1.5"}} /></div>
            <button onClick={saveP} disabled={!editP.name.trim()} style={{ background: editP.name.trim() ? "#C0392B" : "#1a1a1d", border: "none", borderRadius: "6px", padding: "14px", color: editP.name.trim() ? "#fff" : "#444", fontSize: "14px", fontWeight: "600", cursor: editP.name.trim() ? "pointer" : "not-allowed" }}>Save</button>
          </div>
        </div>
      );

      // PROFILE
      if (view === "profile" && cp) {
        const sd = STAGES.find(s => s.id === cp.stage);
        return (
          <div style={{ minHeight: "100vh" }}>
            <Hdr title={cp.name} onBack={() => setView("list")} action={
              <button onClick={() => { setEditP({...cp}); setView("edit"); }} style={{ background: "none", border: "1px solid #2a2a2e", borderRadius: "5px", padding: "5px 10px", color: "#777", fontSize: "12px", cursor: "pointer" }}>Edit</button>
            } />
            <Pipe as={cp.stage} si2={STAGES.findIndex(s => s.id === cp.stage)} />
            <div style={{ maxWidth: "500px", margin: "0 auto", padding: "16px", display: "flex", flexDirection: "column", gap: "11px" }}>
              <div style={{ background: sd?.color+"18", border: `1px solid ${sd?.color}44`, borderRadius: "8px", padding: "14px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                  <div style={{ background: sd?.color, borderRadius: "4px", padding: "3px 8px", fontSize: "11px", fontWeight: "700", color: "#fff" }}>{cp.stage}</div>
                  <div style={{ fontSize: "13px", fontWeight: "600" }}>{sd?.label.split("—")[1]?.trim()}</div>
                </div>
                <div style={{ fontSize: "12px", color: "#888", lineHeight: "1.5", marginBottom: "10px" }}>{sd?.description}</div>
                <div style={{ fontSize: "10px", color: "#555", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: "6px" }}>Move to</div>
                <div style={{ display: "flex", gap: "5px", flexWrap: "wrap" }}>
                  {STAGES.map(s => (
                    <button key={s.id} onClick={() => updStage(cp.id, s.id)} style={{ padding: "3px 8px", borderRadius: "4px", fontSize: "10px", fontWeight: "600", cursor: "pointer", border: `1px solid ${cp.stage === s.id ? s.color : "#222"}`, background: cp.stage === s.id ? s.color : "#141416", color: cp.stage === s.id ? "#fff" : "#444" }}>{s.id}</button>
                  ))}
                </div>
              </div>

              {(cp.overview || cp.notes) && (
                <div style={{...C, padding: "13px"}}>
                  {cp.overview && <><span style={L}>Overview</span><div style={{ fontSize: "13px", color: "#888", lineHeight: "1.5", marginBottom: cp.notes ? "10px" : 0 }}>{cp.overview}</div></>}
                  {cp.notes && <><span style={L}>Notes</span><div style={{ fontSize: "13px", color: "#888", lineHeight: "1.5" }}>{cp.notes}</div></>}
                </div>
              )}

              {[
                { label: "💬  Talk It Through", accent: "#C0392B", fn: () => { setChat([]); setView("coach"); } },
                { label: "📋  Analyse Conversation", accent: "#2980B9", fn: () => { setResult(null); setConvo(""); setSitu(""); setTab("input"); setView("analyse"); } },
                { label: "📖  Stage Reference", accent: "#333", fn: () => setView("stages") },
              ].map(({ label, accent, fn }) => (
                <button key={label} onClick={fn} style={{...C, padding: "15px 16px", cursor: "pointer", textAlign: "left", border: `1px solid ${accent}`, display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%"}}>
                  <span style={{ fontSize: "14px", fontWeight: "600", color: "#e8e6e1" }}>{label}</span>
                  <span style={{ color: "#444", fontSize: "18px" }}>›</span>
                </button>
              ))}

              <button onClick={() => delP(cp.id)} style={{ background: "none", border: "1px solid #2a1a1a", borderRadius: "6px", padding: "11px", color: "#8a4a4a", fontSize: "13px", cursor: "pointer", marginTop: "6px" }}>
                Remove {cp.name}
              </button>
            </div>
          </div>
        );
      }

      // COACH
      if (view === "coach" && cp) return (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
          <Hdr title={`Talk Through — ${cp.name}`} onBack={() => setView("profile")} />
          <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
            {chat.length === 0 && (
              <div style={{ marginBottom: "20px" }}>
                <div style={{ color: "#555", fontSize: "13px", lineHeight: "1.7", marginBottom: "14px" }}>Tell me what's going on with {cp.name}. Where you're at, what's happened, where you're stuck.</div>
                {[
                  `The texting with ${cp.name} is stop-start — should I call her?`,
                  `Things were going well with ${cp.name} but she's gone a bit cold`,
                  `${cp.name} seems interested but I don't know how to push things forward`,
                ].map((s, i) => (
                  <button key={i} onClick={() => sendChat(s)} style={{...C, padding: "10px 13px", color: "#777", fontSize: "13px", cursor: "pointer", textAlign: "left", lineHeight: "1.5", display: "block", width: "100%", marginBottom: "7px"}}>"{s}"</button>
                ))}
              </div>
            )}
            {chat.map((m, i) => (
              <div key={i} style={{ marginBottom: "18px", display: "flex", flexDirection: "column", alignItems: m.role === "user" ? "flex-end" : "flex-start" }}>
                {m.role === "user"
                  ? <div style={{ background: "#1e1e22", borderRadius: "10px 10px 2px 10px", padding: "10px 14px", maxWidth: "82%", fontSize: "13px", color: "#e8e6e1", lineHeight: "1.6" }}>{m.content}</div>
                  : <div style={{ maxWidth: "96%", fontSize: "13px", color: "#bbb", lineHeight: "1.9" }}>{renderMD(m.content)}</div>
                }
              </div>
            ))}
            {loading && <div style={{ color: "#444", fontSize: "13px", fontStyle: "italic" }}>Reading the situation...</div>}
            <div ref={bottomRef} />
          </div>
          <div style={{ borderTop: "1px solid #1a1a1d", padding: "11px 14px", display: "flex", gap: "8px" }}>
            <textarea value={chatIn} onChange={e => setChatIn(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }}} placeholder={`What's happening with ${cp.name}?`} rows={2} style={{...I, flex: 1, resize: "none", lineHeight: "1.5", width: "auto"}} />
            <button onClick={() => sendChat()} disabled={loading || !chatIn.trim()} style={{ background: loading ? "#1a1a1d" : "#C0392B", border: "none", borderRadius: "8px", padding: "0 16px", color: loading ? "#555" : "#fff", cursor: loading ? "not-allowed" : "pointer", fontWeight: "600", fontSize: "13px" }}>Send</button>
          </div>
        </div>
      );

      // ANALYSE
      if (view === "analyse" && cp) return (
        <div style={{ minHeight: "100vh" }}>
          <Hdr title={`Analyse — ${cp.name}`} onBack={() => setView("profile")} />
          <Pipe as={result?.detected_stage || cp.stage} si2={result ? STAGES.findIndex(s => s.id === result.detected_stage) : STAGES.findIndex(s => s.id === cp.stage)} />
          <div style={{ display: "flex", borderBottom: "1px solid #1a1a1d" }}>
            {["input","result"].map(t => (
              <button key={t} onClick={() => setTab(t)} style={{ padding: "11px 20px", background: "none", border: "none", cursor: "pointer", fontSize: "13px", fontWeight: tab === t ? "600" : "400", color: tab === t ? "#e8e6e1" : "#555", borderBottom: tab === t ? "2px solid #C0392B" : "2px solid transparent", textTransform: "capitalize" }}>{t === "input" ? "Input" : "Read"}</button>
            ))}
          </div>
          <div style={{ maxWidth: "680px", margin: "0 auto", padding: "16px" }}>
            {tab === "input" && (
              <div style={{ display: "flex", flexDirection: "column", gap: "13px" }}>
                <div style={{...C, padding: "12px", display: "flex", alignItems: "center", gap: "10px"}}>
                  <div style={{ width: "38px", height: "38px", borderRadius: "50%", background: sc(cp.stage)+"22", border: `2px solid ${sc(cp.stage)}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "16px", fontWeight: "700", color: sc(cp.stage), flexShrink: 0 }}>{cp.name.charAt(0).toUpperCase()}</div>
                  <div>
                    <div style={{ fontWeight: "600", fontSize: "14px" }}>{cp.name}</div>
                    <div style={{ fontSize: "12px", color: "#555" }}>{[cp.age, cp.platform].filter(Boolean).join(" · ")}</div>
                  </div>
                </div>
                <div><span style={L}>Your take on where things are with {cp.name}</span><textarea placeholder={`What's stalling? What have you tried? What's your read on ${cp.name}?`} value={situ} onChange={e => setSitu(e.target.value)} rows={3} style={{...I, resize: "vertical", lineHeight: "1.5"}} /></div>
                <div><span style={L}>Conversation with {cp.name}</span><textarea placeholder="Paste messages. Label if you can (Her: / Me:) but not required." value={convo} onChange={e => setConvo(e.target.value)} rows={10} style={{...I, resize: "vertical", lineHeight: "1.6"}} /></div>
                {error && <div style={{ color: "#C0392B", fontSize: "13px" }}>{error}</div>}
                <button onClick={runAnalysis} disabled={loading} style={{ background: loading ? "#1a1a1d" : "#C0392B", border: "none", borderRadius: "6px", padding: "14px", color: loading ? "#555" : "#fff", fontSize: "14px", fontWeight: "600", cursor: loading ? "not-allowed" : "pointer" }}>{loading ? `Reading ${cp.name}'s messages...` : `Analyse ${cp.name}`}</button>
              </div>
            )}
            {tab === "result" && (
              <div ref={resRef}>
                {!result ? <div style={{ textAlign: "center", color: "#444", padding: "60px 0", fontSize: "13px" }}>No analysis yet. Go to Input tab.</div> : (
                  <div style={{ display: "flex", flexDirection: "column", gap: "11px" }}>
                    <div style={{ background: csData?.color+"18", border: `1px solid ${csData?.color}44`, borderRadius: "8px", padding: "13px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "7px", marginBottom: "7px", flexWrap: "wrap" }}>
                        <div style={{ background: csData?.color, borderRadius: "4px", padding: "3px 8px", fontSize: "11px", fontWeight: "700", color: "#fff" }}>{result.detected_stage}</div>
                        <div style={{ fontWeight: "600", fontSize: "13px" }}>{csData?.label?.split("—")[1]?.trim()}</div>
                        <div style={{ marginLeft: "auto", display: "flex", gap: "5px" }}>
                          <div style={{ padding: "2px 7px", borderRadius: "4px", fontSize: "10px", fontWeight: "600", background: result.hook_point_reached ? "#0d2a0d" : "#1a1a1a", color: result.hook_point_reached ? "#5ab85a" : "#555", border: `1px solid ${result.hook_point_reached ? "#2a5a2a" : "#2a2a2e"}` }}>{result.hook_point_reached ? "✓ Hooked" : "Not hooked"}</div>
                          <div style={{ padding: "2px 7px", borderRadius: "4px", fontSize: "10px", fontWeight: "600", background: "#141416", color: result.buying_temperature === "high" ? "#5a8ab8" : result.buying_temperature === "fading" ? "#b85a5a" : result.buying_temperature === "medium" ? "#b8a85a" : "#555", border: "1px solid #2a2a2e" }}>BT: {result.buying_temperature}</div>
                        </div>
                      </div>
                      <div style={{ fontSize: "12px", color: "#aaa", lineHeight: "1.5" }}>{result.stage_reasoning}</div>
                    </div>
                    <div style={{...C, padding: "12px"}}><span style={L}>Your Move with {cp.name}</span><div style={{ fontSize: "13px", lineHeight: "1.6", color: "#e8e6e1" }}>{result.what_he_needs_to_do}</div></div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
                      <div style={{ background: "#0d1a0d", border: "1px solid #1a3a1a", borderRadius: "8px", padding: "11px" }}>
                        <span style={{...L, color: "#4a8a4a"}}>IOIs from {cp.name}</span>
                        {result.iois_detected?.length ? result.iois_detected.map((s,i) => <div key={i} style={{ fontSize: "11px", color: "#7ab87a", lineHeight: "1.9" }}>✓ {s}</div>) : <div style={{ fontSize: "11px", color: "#444" }}>None clear yet</div>}
                      </div>
                      <div style={{ background: "#1a0d0d", border: "1px solid #3a1a1a", borderRadius: "8px", padding: "11px" }}>
                        <span style={{...L, color: "#8a4a4a"}}>Flags</span>
                        {result.iods_detected?.length ? result.iods_detected.map((s,i) => <div key={i} style={{ fontSize: "11px", color: "#b87a7a", lineHeight: "1.9" }}>⚠ {s}</div>) : <div style={{ fontSize: "11px", color: "#444" }}>Nothing flagged</div>}
                      </div>
                    </div>
                    {result.watch_for && <div style={{ background: "#14100a", border: "1px solid #3a2a0a", borderRadius: "8px", padding: "11px" }}><span style={L}>Blind Spot</span><div style={{ fontSize: "12px", color: "#c8a860", lineHeight: "1.5" }}>{result.watch_for}</div></div>}
                    <div>
                      <span style={L}>Replies to {cp.name}</span>
                      {result.replies?.map((r,i) => (
                        <div key={i} style={{...C, padding: "11px", marginBottom: "8px"}}>
                          <span style={L}>{r.label}</span>
                          <div style={{ fontSize: "13px", color: "#e8e6e1", lineHeight: "1.6" }}>{r.text}</div>
                          <button onClick={() => navigator.clipboard.writeText(r.text)} style={{ marginTop: "7px", background: "none", border: "1px solid #2a2a2e", borderRadius: "4px", padding: "4px 10px", color: "#555", fontSize: "11px", cursor: "pointer" }}>Copy</button>
                        </div>
                      ))}
                    </div>
                    {csData && <div style={{...C, padding: "11px"}}><span style={L}>To Advance Past {result.detected_stage} with {cp.name}</span><div style={{ fontSize: "12px", color: "#777", lineHeight: "1.5" }}>{csData.next}</div></div>}
                    <button onClick={() => { setChat([]); setView("coach"); }} style={{...C, padding: "11px", color: "#C0392B", fontSize: "13px", cursor: "pointer", fontWeight: "600", border: "1px solid #C0392B33", textAlign: "center", width: "100%"}}>Talk it through with {cp.name} →</button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );

      // STAGES
      if (view === "stages") return (
        <div style={{ minHeight: "100vh" }}>
          <Hdr title="Stage Reference" onBack={() => setView(cp ? "profile" : "list")} />
          <div style={{ maxWidth: "680px", margin: "0 auto", padding: "16px", display: "flex", flexDirection: "column", gap: "9px" }}>
            {STAGES.map(s => (
              <div key={s.id} style={{...C, padding: "13px"}}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "7px" }}>
                  <div style={{ background: s.color, borderRadius: "4px", padding: "2px 8px", fontSize: "11px", fontWeight: "700", color: "#fff" }}>{s.id}</div>
                  <div style={{ fontWeight: "600", fontSize: "13px" }}>{s.label.split("—")[1]?.trim()}</div>
                </div>
                <div style={{ fontSize: "12px", color: "#aaa", lineHeight: "1.5", marginBottom: "7px" }}>{s.description}</div>
                <div style={{ fontSize: "11px", color: "#555", marginBottom: "6px" }}>Via text: <span style={{ color: "#777" }}>{s.via_text}</span></div>
                {s.iois.map((ioi,j) => <div key={j} style={{ fontSize: "11px", color: "#555", lineHeight: "1.9" }}>· {ioi}</div>)}
                <div style={{ marginTop: "9px", fontSize: "11px", color: s.color+"bb", borderTop: "1px solid #1e1e22", paddingTop: "7px" }}>→ {s.next}</div>
              </div>
            ))}
            <div style={{ background: "#0d0d0f", border: "1px solid #2a2a2e", borderRadius: "8px", padding: "13px", textAlign: "center" }}>
              <div style={{ fontWeight: "700", fontSize: "13px", color: "#8E44AD" }}>S1+ — Take over in person</div>
              <div style={{ fontSize: "11px", color: "#444", marginTop: "4px" }}>Text work done. You're already warm.</div>
            </div>
          </div>
        </div>
      );

      return <div style={{ padding: "40px", textAlign: "center", color: "#444" }}>Loading...</div>;
    }

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>
</html>
